  <rect x="458" y="78" width="66" height="74" rx="12" fill="#EEF2FF" stroke="#6366F1" stroke-width="1"/>
  <rect x="468" y="96" width="46" height="7" rx="3" fill="#6366F1" opacity="0.5"/>
  <rect x="474" y="110" width="34" height="18" rx="6" fill="url(#grad1)"/>

