<?xml version="1.0" encoding="UTF-8"?>
<svg width="440" height="400" viewBox="0 0 440 400"
     fill="none" xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>FlowSphere — Contact Popup</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
    <!-- Brand gradient -->
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- Hero bg gradient -->
    <linearGradient id="grad-hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <!-- White fade gradient for offer orbs -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Drop shadows -->
    <filter id="shadow-card" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(99,102,241,0.10)"/>
    </filter>
    <filter id="shadow-btn" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(99,102,241,0.35)"/>
    </filter>
    <filter id="shadow-float" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="rgba(99,102,241,0.18)"/>
    </filter>
    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
  </defs>

  <rect width="440" height="400" rx="16" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="24" y="40" font-size="18" font-weight="800" fill="#111827">Contact Information</text>
  <text x="24" y="64" font-size="12" fill="#6B7280">Get in touch with the FlowSphere team. We're here to help.</text>
  
  <!-- Email Info row -->
  <g transform="translate(24, 100)">
    <rect width="36" height="36" rx="8" fill="#EEF2FF"/>
    <text x="18" y="22" text-anchor="middle" font-size="14">✉️</text>
    <text x="50" y="16" font-size="10" font-weight="700" fill="#6B7280">EMAIL US</text>
    <text x="50" y="32" font-size="13" font-weight="700" fill="#6366F1">support@flowsphere.io</text>
  </g>
  
  <!-- Phone Info row -->
  <g transform="translate(24, 156)">
    <rect width="36" height="36" rx="8" fill="#EEF2FF"/>
    <text x="18" y="22" text-anchor="middle" font-size="14">📞</text>
    <text x="50" y="16" font-size="10" font-weight="700" fill="#6B7280">CALL US</text>
    <text x="50" y="32" font-size="13" font-weight="700" fill="#111827">+1 (555) 019-2834</text>
  </g>
  
  <!-- Web Info row -->
  <g transform="translate(24, 212)">
    <rect width="36" height="36" rx="8" fill="#EEF2FF"/>
    <text x="18" y="22" text-anchor="middle" font-size="14">🌐</text>
    <text x="50" y="16" font-size="10" font-weight="700" fill="#6B7280">OFFICIAL WEBSITE</text>
    <text x="50" y="32" font-size="13" font-weight="700" fill="#6366F1">www.flowsphere.io</text>
  </g>
  
  <!-- Social Title -->
  <text x="24" y="286" font-size="11" font-weight="700" fill="#6B7280">FOLLOW US</text>
  <g transform="translate(24, 296)">
    
    <g transform="translate(0,0)">
      <rect width="32" height="32" rx="8" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
      <circle cx="16" cy="16" r="4" fill="#6366F1"/>
    </g>
    <g transform="translate(40,0)">
      <rect width="32" height="32" rx="8" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
      <circle cx="16" cy="16" r="4" fill="#6366F1"/>
    </g>
    <g transform="translate(80,0)">
      <rect width="32" height="32" rx="8" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
      <circle cx="16" cy="16" r="4" fill="#6366F1"/>
    </g>
  </g>
  
  <g transform="translate(24, 340)">
    <rect width="392" height="40" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
    <text x="196" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Close</text>
  </g>
  
  <!-- Close Button X -->
  <g transform="translate(396, 16)">
    <circle cx="14" cy="14" r="14" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    <path d="M9 9l10 10M19 9L9 19" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
</svg>