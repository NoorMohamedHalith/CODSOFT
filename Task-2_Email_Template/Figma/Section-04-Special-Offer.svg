<?xml version="1.0" encoding="UTF-8"?>
<svg width="640" height="200" viewBox="0 0 640 200"
     fill="none" xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>FlowSphere — Special Offer</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
    <!-- Brand gradient -->
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- Hero bg gradient -->
    <linearGradient id="grad-hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <!-- White fade gradient for offer orbs -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Drop shadows -->
    <filter id="shadow-card" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(99,102,241,0.10)"/>
    </filter>
    <filter id="shadow-btn" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(99,102,241,0.35)"/>
    </filter>
    <filter id="shadow-float" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="rgba(99,102,241,0.18)"/>
    </filter>
    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
  </defs>

  <g id="Section-Special-Offer" transform="translate(0,0)">
    <rect width="640" height="200" fill="#FFFFFF"/>
    <!-- Offer card -->
    <rect x="24" y="16" width="592" height="168" rx="20" fill="url(#grad-brand)"/>
    <!-- Decorative orbs -->
    <circle cx="576" cy="40" r="100" fill="url(#orb1)"/>
    <circle cx="64"   cy="185" r="80"  fill="url(#orb1)"/>

    <!-- Limited time badge -->
    <rect x="246" y="28" width="148" height="24" rx="12" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.30)" stroke-width="1"/>
    <text x="320" y="44" text-anchor="middle" font-size="10.5" font-weight="700" fill="white" letter-spacing="0.3">✨  Limited Time Offer</text>

    <!-- 30 days big number -->
    <text x="320" y="100" text-anchor="middle" font-size="56" font-weight="900" fill="white" letter-spacing="-2" opacity="0.95">30</text>

    <!-- Label -->
    <text x="320" y="124" text-anchor="middle" font-size="20" font-weight="700" fill="white">Days Premium Free</text>

    <!-- Sub -->
    <text x="320" y="144" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.80)">No credit card required. Start your free trial today.</text>

    <!-- White CTA button -->
    <rect x="228" y="156" width="184" height="18" rx="0" fill="none"/>
    <g id="Offer-CTA" transform="translate(230,152)">
      <rect width="180" height="30" rx="8" fill="#FFFFFF"/>
      <text x="90" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#6366F1">⭐  Claim Now — It's Free</text>
    </g>
  </g>
</svg>