<?xml version="1.0" encoding="UTF-8"?>
<svg width="640" height="160" viewBox="0 0 640 160"
     fill="none" xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>FlowSphere — Download App</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
    <!-- Brand gradient -->
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- Hero bg gradient -->
    <linearGradient id="grad-hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <!-- White fade gradient for offer orbs -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Drop shadows -->
    <filter id="shadow-card" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(99,102,241,0.10)"/>
    </filter>
    <filter id="shadow-btn" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(99,102,241,0.35)"/>
    </filter>
    <filter id="shadow-float" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="rgba(99,102,241,0.18)"/>
    </filter>
    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
  </defs>

  <g id="Section-Download-App" transform="translate(0,0)">
    <rect width="640" height="160" fill="#FFFFFF"/>
    <text x="320" y="30" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6366F1" letter-spacing="1.2">GET THE APP</text>
    <text x="320" y="54" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Work From Anywhere</text>
    <text x="320" y="74" text-anchor="middle" font-size="13" fill="#6B7280">Available for iOS and Android.</text>
    
    <g transform="translate(144,100)">
      <rect width="168" height="48" rx="10" fill="#0F172A"/>
      <rect width="168" height="48" rx="10" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
      <path d="M24 16L34 24L24 32V16Z" fill="white"/>
      <text x="48" y="25" font-size="9.5" fill="rgba(255,255,255,0.65)">GET IT ON</text>
      <text x="48" y="40" font-size="16" font-weight="700" fill="white">Google Play</text>
    </g>
    
    <g transform="translate(328,100)">
      <rect width="168" height="48" rx="10" fill="#0F172A"/>
      <rect width="168" height="48" rx="10" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
      <path d="M24 16L34 24L24 32V16Z" fill="white"/>
      <text x="48" y="25" font-size="9.5" fill="rgba(255,255,255,0.65)">DOWNLOAD ON THE</text>
      <text x="48" y="40" font-size="16" font-weight="700" fill="white">App Store</text>
    </g>
  </g>
</svg>