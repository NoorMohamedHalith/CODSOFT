<?xml version="1.0" encoding="UTF-8"?>
<svg width="1440" height="1080" viewBox="0 0 1440 1080" fill="none"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Page 11 — High-Fidelity Mobile Mockup</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
    </style>
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(99,102,241,0.08)"/>
    </filter>
    <filter id="shadow-modal">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>

  <rect width="1440" height="1080" fill="#FFFFFF"/>
  
  <!-- Page Header -->
  <rect width="1440" height="80" fill="#FFFFFF"/>
  <line x1="0" y1="79.5" x2="1440" y2="79.5" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Logo -->
  <rect x="40" y="24" width="32" height="32" rx="8" fill="url(#grad-brand)"/>
  <path d="M56 30l-4 2v4a4 4 0 008 0v-4l-4-2z" fill="white"/>
  <text x="82" y="46" font-size="16" font-weight="800" fill="url(#grad-brand)">FlowSphere</text>
  <text x="180" y="45" font-size="14" font-weight="400" fill="#6B7280" opacity="0.5">|</text>
  <text x="196" y="46" font-size="15" font-weight="700" fill="#111827">High-Fidelity Mobile Mockup Speccing</text>
  <!-- Page number -->
  <rect x="1340" y="24" width="60" height="32" rx="16" fill="#EEF2FF"/>
  <text x="1370" y="45" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">PAGE 11</text>
  

  <!-- Mobile phone outline floating -->
  <g transform="translate(532, 120)" filter="url(#shadow)">
    <rect width="375" height="812" rx="40" fill="white" stroke="#1E293B" stroke-width="12"/>
    <!-- Top Notch -->
    <rect x="112" y="12" width="150" height="20" rx="10" fill="#1E293B"/>
    <!-- Screen content area -->
    <rect x="12" y="40" width="351" height="732" rx="28" fill="#F8FAFC"/>
    
    <!-- Mobile header -->
    <rect x="12" y="40" width="351" height="50" rx="28 28 0 0" fill="white" stroke="#E5E7EB" stroke-width="1"/>
    <circle cx="40" cy="65" r="10" fill="url(#grad-brand)"/>
    <text x="60" y="70" font-size="12" font-weight="800" fill="url(#grad-brand)">FlowSphere</text>

    <!-- Mobile Hero -->
    <rect x="12" y="90" width="351" height="280" fill="#EEF2FF"/>
    <text x="187" y="140" font-size="20" font-weight="800" fill="#111827" text-anchor="middle">Welcome to</text>
    <text x="187" y="166" font-size="20" font-weight="800" fill="#6366F1" text-anchor="middle">FlowSphere</text>
    <rect x="97" y="200" width="180" height="36" rx="8" fill="url(#grad-brand)"/>
    <text x="187" y="222" font-size="11" font-weight="700" fill="white" text-anchor="middle">Get Started Free</text>

    <!-- Mobile Features stacked -->
    
      <g transform="translate(24, 390)">
        <rect width="327" height="60" rx="10" fill="white" stroke="#E5E7EB" stroke-width="1"/>
        <rect x="10" y="10" width="40" height="40" rx="8" fill="#EEF2FF"/>
        <rect x="60" y="22" width="160" height="8" rx="4" fill="#111827"/>
        <rect x="60" y="38" width="220" height="6" rx="3" fill="#6B7280"/>
      </g>
    
      <g transform="translate(24, 460)">
        <rect width="327" height="60" rx="10" fill="white" stroke="#E5E7EB" stroke-width="1"/>
        <rect x="10" y="10" width="40" height="40" rx="8" fill="#EEF2FF"/>
        <rect x="60" y="22" width="160" height="8" rx="4" fill="#111827"/>
        <rect x="60" y="38" width="220" height="6" rx="3" fill="#6B7280"/>
      </g>
    
      <g transform="translate(24, 530)">
        <rect width="327" height="60" rx="10" fill="white" stroke="#E5E7EB" stroke-width="1"/>
        <rect x="10" y="10" width="40" height="40" rx="8" fill="#EEF2FF"/>
        <rect x="60" y="22" width="160" height="8" rx="4" fill="#111827"/>
        <rect x="60" y="38" width="220" height="6" rx="3" fill="#6B7280"/>
      </g>
    
  </g>

  <!-- Mobile spec callouts -->
  <g transform="translate(80, 220)">
    <rect width="380" height="160" rx="16" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    <text x="30" y="36" font-size="13" font-weight="700" fill="#6366F1">FLUID TYPE SCALE</text>
    <text x="30" y="64" font-size="15" font-weight="800" fill="#111827">Mobile Typo Auto-resize</text>
    <text x="30" y="88" font-size="12" fill="#6B7280" line-height="1.6">The typography scale rescales title sizes from 36px on desktop</text>
    <text x="30" y="106" font-size="12" fill="#6B7280">down to 24px on mobile screens dynamically for readability.</text>
  </g>

  <g transform="translate(980, 220)">
    <rect width="380" height="160" rx="16" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    <text x="30" y="36" font-size="13" font-weight="700" fill="#6366F1">VERTICAL FEATURE STACKING</text>
    <text x="30" y="64" font-size="15" font-weight="800" fill="#111827">Responsive Flexbox Flow</text>
    <text x="30" y="88" font-size="12" fill="#6B7280" line-height="1.6">Feature cards stack into single columns with icon left-aligned,</text>
    <text x="30" y="106" font-size="12" fill="#6B7280">maximizing thumb clickability targets on portrait viewports.</text>
  </g>
  
</svg>