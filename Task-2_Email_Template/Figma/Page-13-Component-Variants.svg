<?xml version="1.0" encoding="UTF-8"?>
<svg width="1440" height="1080" viewBox="0 0 1440 1080" fill="none"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Page 13 — Component Variants</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
    </style>
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(99,102,241,0.08)"/>
    </filter>
    <filter id="shadow-modal">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>

  <rect width="1440" height="1080" fill="#FFFFFF"/>
  
  <!-- Page Header -->
  <rect width="1440" height="80" fill="#FFFFFF"/>
  <line x1="0" y1="79.5" x2="1440" y2="79.5" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Logo -->
  <rect x="40" y="24" width="32" height="32" rx="8" fill="url(#grad-brand)"/>
  <path d="M56 30l-4 2v4a4 4 0 008 0v-4l-4-2z" fill="white"/>
  <text x="82" y="46" font-size="16" font-weight="800" fill="url(#grad-brand)">FlowSphere</text>
  <text x="180" y="45" font-size="14" font-weight="400" fill="#6B7280" opacity="0.5">|</text>
  <text x="196" y="46" font-size="15" font-weight="700" fill="#111827">Component Variants Matrix</text>
  <!-- Page number -->
  <rect x="1340" y="24" width="60" height="32" rx="16" fill="#EEF2FF"/>
  <text x="1370" y="45" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">PAGE 13</text>
  

  <!-- Section Title -->
  <text x="80" y="130" font-size="18" font-weight="800" fill="#111827">Button Component States &amp; Variants</text>

  <!-- Button state variants table matrix -->
  <g transform="translate(80, 170)">
    <!-- Header -->
    <rect width="1280" height="40" rx="8" fill="#EEF2FF"/>
    <text x="24"  y="25" font-size="11" font-weight="800" fill="#6366F1">VARIANT</text>
    <text x="240" y="25" font-size="11" font-weight="800" fill="#6366F1">DEFAULT</text>
    <text x="500" y="25" font-size="11" font-weight="800" fill="#6366F1">HOVER</text>
    <text x="760" y="25" font-size="11" font-weight="800" fill="#6366F1">ACTIVE</text>
    <text x="1020" y="25" font-size="11" font-weight="800" fill="#6366F1">DISABLED</text>

    <!-- Row 1: Primary Button -->
    <g transform="translate(0, 60)">
      <text x="24" y="32" font-size="12" font-weight="700" fill="#111827">Button/Primary</text>
      <!-- Default -->
      <g transform="translate(240, 6)">
        <rect width="160" height="40" rx="8" fill="url(#grad-brand)"/>
        <text x="80" y="24" font-size="12" font-weight="600" fill="white" text-anchor="middle">→ Get Started</text>
      </g>
      <!-- Hover -->
      <g transform="translate(500, 6)" filter="url(#shadow)">
        <rect width="160" height="40" rx="8" fill="#4F46E5"/>
        <text x="80" y="24" font-size="12" font-weight="600" fill="white" text-anchor="middle">→ Get Started</text>
      </g>
      <!-- Active -->
      <g transform="translate(760, 6)">
        <rect width="160" height="40" rx="8" fill="#4F46E5" stroke="#8B5CF6" stroke-width="2"/>
        <text x="80" y="24" font-size="12" font-weight="600" fill="white" text-anchor="middle">→ Get Started</text>
      </g>
      <!-- Disabled -->
      <g transform="translate(1020, 6)">
        <rect width="160" height="40" rx="8" fill="#E5E7EB"/>
        <text x="80" y="24" font-size="12" font-weight="600" fill="#6B7280" text-anchor="middle">→ Get Started</text>
      </g>
    </g>

    <!-- Row 2: Secondary Button -->
    <g transform="translate(0, 160)">
      <text x="24" y="32" font-size="12" font-weight="700" fill="#111827">Button/Secondary</text>
      <!-- Default -->
      <g transform="translate(240, 6)">
        <rect width="160" height="40" rx="8" fill="white" stroke="#6366F1" stroke-width="1.5"/>
        <text x="80" y="24" font-size="12" font-weight="600" fill="#6366F1" text-anchor="middle">Learn More</text>
      </g>
      <!-- Hover -->
      <g transform="translate(500, 6)">
        <rect width="160" height="40" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
        <text x="80" y="24" font-size="12" font-weight="600" fill="#6366F1" text-anchor="middle">Learn More</text>
      </g>
      <!-- Active -->
      <g transform="translate(760, 6)">
        <rect width="160" height="40" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
        <text x="80" y="24" font-size="12" font-weight="600" fill="#4F46E5" text-anchor="middle">Learn More</text>
      </g>
      <!-- Disabled -->
      <g transform="translate(1020, 6)">
        <rect width="160" height="40" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
        <text x="80" y="24" font-size="12" font-weight="600" fill="#E5E7EB" text-anchor="middle">Learn More</text>
      </g>
    </g>
  </g>

  <!-- Spacing / naming notes -->
  <g transform="translate(80, 500)">
    <rect width="1280" height="140" rx="16" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    <text x="40" y="40" font-size="14" font-weight="700" fill="#111827">Component Variant Properties</text>
    <text x="40" y="70" font-size="12.5" fill="#6B7280" line-height="1.6">
      Every component variants is fully specced inside our Figma library file. Properties include:
    </text>
    <text x="40" y="90" font-size="12" font-weight="600" fill="#6366F1">type=[Primary, Secondary, Ghost] · size=[Large, Medium, Small] · state=[Default, Hover, Active, Disabled]</text>
  </g>
  
</svg>