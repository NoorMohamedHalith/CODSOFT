<?xml version="1.0" encoding="UTF-8"?>
<svg width="640" height="800" viewBox="0 0 640 800"
     fill="none" xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>FlowSphere — Terms & Conditions Page</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
    <!-- Brand gradient -->
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- Hero bg gradient -->
    <linearGradient id="grad-hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <!-- White fade gradient for offer orbs -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Drop shadows -->
    <filter id="shadow-card" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(99,102,241,0.10)"/>
    </filter>
    <filter id="shadow-btn" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(99,102,241,0.35)"/>
    </filter>
    <filter id="shadow-float" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="rgba(99,102,241,0.18)"/>
    </filter>
    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
  </defs>

  <rect width="640" height="800" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <g transform="translate(24, 24)">
    <rect width="130" height="36" rx="8" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    <text x="65" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#6366F1">← Back to Email</text>
  </g>
  <text x="24" y="96" font-size="24" font-weight="800" fill="#111827">Terms &amp; Conditions</text>
  <line x1="24" y1="116" x2="616" y2="116" stroke="#E5E7EB" stroke-width="1"/>
  
  <g transform="translate(24, 140)">
    <text x="0" y="20" font-size="14" font-weight="700" fill="#111827">1. Terms of Use</text>
    <text x="0" y="42" font-size="12.5" fill="#6B7280">These terms specify access permissions and licensing for FlowSphere SaaS templates.</text>
    
    <text x="0" y="90" font-size="14" font-weight="700" fill="#111827">2. Accounts</text>
    <text x="0" y="112" font-size="12.5" fill="#6B7280">Accounts are restricted to individual or team use. Shared logins violate our</text>
    <text x="0" y="130" font-size="12.5" fill="#6B7280">terms and may lead to workspace locking.</text>
    
    <text x="0" y="180" font-size="14" font-weight="700" fill="#111827">3. Limitations</text>
    <text x="0" y="202" font-size="12.5" fill="#6B7280">FlowSphere is not liable for data lapses caused by third-party integrations.</text>
  </g>
  
</svg>