<?xml version="1.0" encoding="UTF-8"?>
<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Page 1 — Cover</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
    </style>
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(99,102,241,0.08)"/>
    </filter>
    <filter id="shadow-modal">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="#0F172A"/>
  <!-- Subtle grid pattern -->
  <path d="M0 0h1440v900H0z" fill="none" opacity=".03" stroke="#FFF" stroke-width="1"/>
  
  <g transform="translate(120, 260)">
    <rect x="-10" y="-12" width="220" height="36" rx="18" fill="rgba(99,102,241,0.15)" stroke="#6366F1" stroke-width="1.5"/>
    <text x="100" y="11" font-size="12" font-weight="800" fill="#6366F1" text-anchor="middle" letter-spacing="1.5">CODSOFT UI/UX · TASK 2</text>
    
    <text x="0" y="110" font-size="72" font-weight="900" fill="white" letter-spacing="-2px">FlowSphere</text>
    <text x="0" y="170" font-size="36" font-weight="700" fill="url(#grad-brand)">Responsive Email Case Study</text>
    <text x="0" y="210" font-size="18" font-weight="400" fill="#6B7280">Welcome &amp; Product Launch Marketing Design System</text>
  </g>

  <g transform="translate(120, 780)">
    <text x="0" y="0" font-size="14" font-weight="600" fill="white">Designed by: Noor Mohamed Halith</text>
    <text x="0" y="22" font-size="12" fill="#6B7280">Senior Product Design Portfolio Upgrade · 2025</text>
  </g>

  <!-- Color swatches visual at bottom -->
  <g transform="translate(1100, 780)">
    
      <circle cx="0" cy="0" r="14" fill="#6366F1" stroke="#E5E7EB" stroke-width="1"/>
    
      <circle cx="40" cy="0" r="14" fill="#8B5CF6" stroke="#E5E7EB" stroke-width="1"/>
    
      <circle cx="80" cy="0" r="14" fill="#22C55E" stroke="#E5E7EB" stroke-width="1"/>
    
      <circle cx="120" cy="0" r="14" fill="#111827" stroke="#E5E7EB" stroke-width="1"/>
    
      <circle cx="160" cy="0" r="14" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    
  </g>
  
</svg>