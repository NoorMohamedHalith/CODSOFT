<?xml version="1.0" encoding="UTF-8"?>
<svg width="640" height="240" viewBox="0 0 640 240"
     fill="none" xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>FlowSphere — Features</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
    <!-- Brand gradient -->
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- Hero bg gradient -->
    <linearGradient id="grad-hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <!-- White fade gradient for offer orbs -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Drop shadows -->
    <filter id="shadow-card" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(99,102,241,0.10)"/>
    </filter>
    <filter id="shadow-btn" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(99,102,241,0.35)"/>
    </filter>
    <filter id="shadow-float" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="rgba(99,102,241,0.18)"/>
    </filter>
    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
  </defs>

  <g id="Section-Features" transform="translate(0,0)">
    <rect width="640" height="240" fill="#FFFFFF"/>
    <!-- Eyebrow -->
    <text x="320" y="32" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6366F1" letter-spacing="1.2">EVERYTHING YOU NEED</text>
    <!-- Title -->
    <text x="320" y="58" text-anchor="middle" font-size="24" font-weight="700" fill="#111827" letter-spacing="-0.3">Powerful Features</text>
    <!-- Subtitle -->
    <text x="320" y="78" text-anchor="middle" font-size="13" fill="#6B7280">Built for teams of all sizes to collaborate, track, and deliver.</text>

    <!-- Cards -->
    
  <g id="FeatureCard-SmartTask" transform="translate(40,96)" filter="url(#shadow-card)">
    <rect width="176" height="160" rx="14" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    <!-- Icon bg -->
    <rect x="62" y="20" width="52" height="52" rx="10" fill="#EEF2FF"/>
    <!-- Icon -->
    <g transform="translate(75,33)"><rect width="26" height="3" rx="1.5" fill="#6366F1"/>
    <rect y="8" width="26" height="3" rx="1.5" fill="#6366F1" opacity="0.6"/>
    <rect y="16" width="18" height="3" rx="1.5" fill="#6366F1" opacity="0.35"/>
    <circle cx="24" cy="17" r="5" fill="#22C55E"/>
    <path d="M21.5 17l2 2 3-3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></g>
    <!-- Title -->
    <text x="88" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Smart Task</text>
    <!-- Desc -->
    <text x="88" y="113" text-anchor="middle" font-size="10.5" fill="#6B7280">AI-powered task</text>
    <text x="88" y="127" text-anchor="middle" font-size="10.5" fill="#6B7280">management.</text>
  </g>
    
  <g id="FeatureCard-TeamCollab" transform="translate(232,96)" filter="url(#shadow-card)">
    <rect width="176" height="160" rx="14" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    <!-- Icon bg -->
    <rect x="62" y="20" width="52" height="52" rx="10" fill="#F5F3FF"/>
    <!-- Icon -->
    <g transform="translate(75,33)"><circle cx="10" cy="8" r="5" fill="#8B5CF6"/>
    <circle cx="20" cy="8" r="5" fill="#8B5CF6" opacity="0.5"/>
    <path d="M1 26C1 21 5 18 10 18c1.7 0 3.3.5 4.5 1.3" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round"/>
    <path d="M25 26C25 21 21 18 16 18c-1.7 0-3.3.5-4.5 1.3" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" opacity="0.6"/></g>
    <!-- Title -->
    <text x="88" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Team Collab</text>
    <!-- Desc -->
    <text x="88" y="113" text-anchor="middle" font-size="10.5" fill="#6B7280">Real-time collab</text>
    <text x="88" y="127" text-anchor="middle" font-size="10.5" fill="#6B7280">anywhere.</text>
  </g>
    
  <g id="FeatureCard-Analytics" transform="translate(424,96)" filter="url(#shadow-card)">
    <rect width="176" height="160" rx="14" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    <!-- Icon bg -->
    <rect x="62" y="20" width="52" height="52" rx="10" fill="#ECFDF5"/>
    <!-- Icon -->
    <g transform="translate(75,33)"><rect y="14" width="8" height="12" rx="2" fill="#22C55E" opacity="0.4"/>
    <rect x="10" y="10" width="8" height="16" rx="2" fill="#22C55E" opacity="0.65"/>
    <rect x="20" y="6" width="8" height="20" rx="2" fill="#22C55E"/>
    <polyline points="4,8 14,4 24,2" stroke="#16A34A" stroke-width="2" stroke-linecap="round" fill="none"/>
    <circle cx="4" cy="8" r="2" fill="#16A34A"/>
    <circle cx="14" cy="4" r="2" fill="#16A34A"/>
    <circle cx="24" cy="2" r="2" fill="#16A34A"/></g>
    <!-- Title -->
    <text x="88" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Analytics</text>
    <!-- Desc -->
    <text x="88" y="113" text-anchor="middle" font-size="10.5" fill="#6B7280">Deep productivity</text>
    <text x="88" y="127" text-anchor="middle" font-size="10.5" fill="#6B7280">insights.</text>
  </g>
  </g>
</svg>