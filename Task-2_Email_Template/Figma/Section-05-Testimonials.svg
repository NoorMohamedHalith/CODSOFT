<?xml version="1.0" encoding="UTF-8"?>
<svg width="640" height="248" viewBox="0 0 640 248"
     fill="none" xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>FlowSphere — Testimonials</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
    <!-- Brand gradient -->
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- Hero bg gradient -->
    <linearGradient id="grad-hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <!-- White fade gradient for offer orbs -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Drop shadows -->
    <filter id="shadow-card" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(99,102,241,0.10)"/>
    </filter>
    <filter id="shadow-btn" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(99,102,241,0.35)"/>
    </filter>
    <filter id="shadow-float" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="rgba(99,102,241,0.18)"/>
    </filter>
    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
  </defs>

  <g id="Section-Testimonials" transform="translate(0,0)">
    <rect width="640" height="248" fill="#F8FAFC"/>
    <text x="320" y="30" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6366F1" letter-spacing="1.2">WHAT PEOPLE SAY</text>
    <text x="320" y="54" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Loved by Teams</text>
    
    <g id="Testimonial-Sarah-Chen" transform="translate(24,72)" filter="url(#shadow-card)">
      <rect width="284" height="148" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
      <!-- Big quote mark -->
      <text x="266" y="42" font-size="52" fill="#EEF2FF" font-weight="900">"</text>
      <!-- Stars -->
      <path d="M14 18 l2.2 4.5 5 .7-3.6 3.5.85 5-4.45-2.3-4.45 2.3.85-5-3.6-3.5 5-.7z" fill="#F59E0B"/><path d="M31 18 l2.2 4.5 5 .7-3.6 3.5.85 5-4.45-2.3-4.45 2.3.85-5-3.6-3.5 5-.7z" fill="#F59E0B"/><path d="M48 18 l2.2 4.5 5 .7-3.6 3.5.85 5-4.45-2.3-4.45 2.3.85-5-3.6-3.5 5-.7z" fill="#F59E0B"/><path d="M65 18 l2.2 4.5 5 .7-3.6 3.5.85 5-4.45-2.3-4.45 2.3.85-5-3.6-3.5 5-.7z" fill="#F59E0B"/><path d="M82 18 l2.2 4.5 5 .7-3.6 3.5.85 5-4.45-2.3-4.45 2.3.85-5-3.6-3.5 5-.7z" fill="#F59E0B"/>
      <!-- Quote text -->
      <text x="14" y="56" font-size="10.5" fill="#111827" font-style="italic">"FlowSphere completely transformed how o</text>
      <text x="14" y="70" font-size="10.5" fill="#111827" font-style="italic">ur remote team operates. We ship 40% fas</text>
      <text x="14" y="84" font-size="10.5" fill="#111827" font-style="italic">ter now."</text>
      <!-- Author -->
      <circle cx="28" cy="122" r="16" fill="#EEF2FF"/>
      <circle cx="28" cy="118" r="6"  fill="#6366F1"/>
      <path d="M14 136C14 130.477 20.268 127 28 127s14 3.477 14 9" fill="#6366F1" opacity="0.5"/>
      <text x="50" y="117" font-size="12" font-weight="600" fill="#111827">Sarah Chen</text>
      <text x="50" y="131" font-size="10.5" fill="#6B7280">Engineering Lead @ Nexus Labs</text>
    </g>
    
    <g id="Testimonial-Marcus-Rivera" transform="translate(332,72)" filter="url(#shadow-card)">
      <rect width="284" height="148" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
      <!-- Big quote mark -->
      <text x="266" y="42" font-size="52" fill="#EEF2FF" font-weight="900">"</text>
      <!-- Stars -->
      <path d="M14 18 l2.2 4.5 5 .7-3.6 3.5.85 5-4.45-2.3-4.45 2.3.85-5-3.6-3.5 5-.7z" fill="#F59E0B"/><path d="M31 18 l2.2 4.5 5 .7-3.6 3.5.85 5-4.45-2.3-4.45 2.3.85-5-3.6-3.5 5-.7z" fill="#F59E0B"/><path d="M48 18 l2.2 4.5 5 .7-3.6 3.5.85 5-4.45-2.3-4.45 2.3.85-5-3.6-3.5 5-.7z" fill="#F59E0B"/><path d="M65 18 l2.2 4.5 5 .7-3.6 3.5.85 5-4.45-2.3-4.45 2.3.85-5-3.6-3.5 5-.7z" fill="#F59E0B"/><path d="M82 18 l2.2 4.5 5 .7-3.6 3.5.85 5-4.45-2.3-4.45 2.3.85-5-3.6-3.5 5-.7z" fill="#F59E0B"/>
      <!-- Quote text -->
      <text x="14" y="56" font-size="10.5" fill="#111827" font-style="italic">"We replaced 3 different tools with Flow</text>
      <text x="14" y="70" font-size="10.5" fill="#111827" font-style="italic">Sphere. Setup took 10 minutes. Incredibl</text>
      <text x="14" y="84" font-size="10.5" fill="#111827" font-style="italic">e product!"</text>
      <!-- Author -->
      <circle cx="28" cy="122" r="16" fill="#F5F3FF"/>
      <circle cx="28" cy="118" r="6"  fill="#8B5CF6"/>
      <path d="M14 136C14 130.477 20.268 127 28 127s14 3.477 14 9" fill="#8B5CF6" opacity="0.5"/>
      <text x="50" y="117" font-size="12" font-weight="600" fill="#111827">Marcus Rivera</text>
      <text x="50" y="131" font-size="10.5" fill="#6B7280">Product Manager @ Velocity Inc</text>
    </g>
  </g>
</svg>