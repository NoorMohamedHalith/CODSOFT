<?xml version="1.0" encoding="UTF-8"?>
<svg width="1440" height="1080" viewBox="0 0 1440 1080" fill="none"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Page 10 — High-Fidelity Desktop Mockup</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
    </style>
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(99,102,241,0.08)"/>
    </filter>
    <filter id="shadow-modal">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>

  <rect width="1440" height="1080" fill="#FFFFFF"/>
  
  <!-- Page Header -->
  <rect width="1440" height="80" fill="#FFFFFF"/>
  <line x1="0" y1="79.5" x2="1440" y2="79.5" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Logo -->
  <rect x="40" y="24" width="32" height="32" rx="8" fill="url(#grad-brand)"/>
  <path d="M56 30l-4 2v4a4 4 0 008 0v-4l-4-2z" fill="white"/>
  <text x="82" y="46" font-size="16" font-weight="800" fill="url(#grad-brand)">FlowSphere</text>
  <text x="180" y="45" font-size="14" font-weight="400" fill="#6B7280" opacity="0.5">|</text>
  <text x="196" y="46" font-size="15" font-weight="700" fill="#111827">High-Fidelity Desktop Mockup Speccing</text>
  <!-- Page number -->
  <rect x="1340" y="24" width="60" height="32" rx="16" fill="#EEF2FF"/>
  <text x="1370" y="45" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">PAGE 10</text>
  

  <!-- Desktop mock centered floating -->
  <g transform="translate(400, 120)" filter="url(#shadow)">
    <rect width="640" height="880" rx="16" fill="undefined"/>
    <g transform="translate(0, 20)">
      <rect x="20" y="0" width="600" height="840" rx="12" fill="white"/>
      <text x="320" y="400" font-size="28" font-weight="800" fill="#6366F1" text-anchor="middle">FlowSphere Email</text>
      <text x="320" y="430" font-size="14" fill="#6B7280" text-anchor="middle">[High fidelity responsive layout committed to main root index.html]</text>
    </g>
  </g>

  <!-- Side specs callout boxes (Left & Right) -->
  <g transform="translate(60, 180)">
    <rect width="300" height="150" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    <text x="24" y="36" font-size="12" font-weight="700" fill="#6366F1">1. LOGO SEGMENT</text>
    <text x="24" y="64" font-size="14" font-weight="800" fill="#111827">FlowSphere Branding</text>
    <text x="24" y="86" font-size="12" fill="#6B7280">Custom vector logo grouped as editable layers in active group frame.</text>
  </g>

  <g transform="translate(60, 360)">
    <rect width="300" height="150" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    <text x="24" y="36" font-size="12" font-weight="700" fill="#6366F1">2. HERO ILLUSTRATION</text>
    <text x="24" y="64" font-size="14" font-weight="800" fill="#111827">Interactive Dashboard</text>
    <text x="24" y="86" font-size="12" fill="#6B7280">SVG diagram layout showing task status widgets, analytics, and metrics.</text>
  </g>

  <g transform="translate(1080, 180)">
    <rect width="300" height="150" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    <text x="24" y="36" font-size="12" font-weight="700" fill="#6366F1">3. FEATURES ROW</text>
    <text x="24" y="64" font-size="14" font-weight="800" fill="#111827">Feature Card System</text>
    <text x="24" y="86" font-size="12" fill="#6B7280">Three cards showcasing automation, collaboration, and analytics capabilities.</text>
  </g>

  <g transform="translate(1080, 360)">
    <rect width="300" height="150" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    <text x="24" y="36" font-size="12" font-weight="700" fill="#6366F1">4. SPECIAL CONVERSION</text>
    <text x="24" y="64" font-size="14" font-weight="800" fill="#111827">30-Day Premium CTA</text>
    <text x="24" y="86" font-size="12" fill="#6B7280">Urgency-driven countdown block designed to optimize customer onboarding conversion.</text>
  </g>
  
</svg>