<?xml version="1.0" encoding="UTF-8"?>
<svg width="640" height="480" viewBox="0 0 640 480"
     fill="none" xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>FlowSphere — Hero</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
    <!-- Brand gradient -->
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- Hero bg gradient -->
    <linearGradient id="grad-hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <!-- White fade gradient for offer orbs -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Drop shadows -->
    <filter id="shadow-card" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(99,102,241,0.10)"/>
    </filter>
    <filter id="shadow-btn" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(99,102,241,0.35)"/>
    </filter>
    <filter id="shadow-float" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="rgba(99,102,241,0.18)"/>
    </filter>
    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
  </defs>

  <g id="Section-Hero" transform="translate(0,0)">
    <!-- BG -->
    <rect width="640" height="480" fill="url(#grad-hero-bg)"/>
    <!-- Decorative orbs -->
    <circle cx="580" cy="60" r="120" fill="url(#orb1)"/>
    <circle cx="60" cy="420" r="90"  fill="url(#orb1)"/>

    <!-- Launch badge -->
    <g id="Hero-Badge" transform="translate(320,48)" >
      <rect x="-100" y="-15" width="200" height="30" rx="15" fill="#FFFFFF" stroke="#EEF2FF" stroke-width="1.5"/>
      <circle cx="-82" cy="0" r="5" fill="#22C55E"/>
      <text x="-72" y="5" font-size="11" font-weight="600" fill="#6366F1">🚀  Product Launch — Now Live</text>
    </g>

    <!-- Title line 1 -->
    <text x="320" y="108" text-anchor="middle" font-size="34" font-weight="800" fill="#111827" letter-spacing="-0.8">Welcome to</text>
    <!-- Title line 2 — gradient -->
    <text x="320" y="150" text-anchor="middle" font-size="34" font-weight="800" fill="url(#grad-brand)" letter-spacing="-0.8">FlowSphere</text>

    <!-- Subtitle -->
    <text x="320" y="182" text-anchor="middle" font-size="15" font-weight="400" fill="#6B7280">Organize your work smarter and achieve more every day.</text>
    <text x="320" y="200" text-anchor="middle" font-size="15" font-weight="400" fill="#6B7280">The all-in-one productivity platform built for modern teams.</text>

    <!-- Dashboard Illustration -->
    <g id="Hero-Illustration" transform="translate(90, 220)" filter="url(#shadow-float)">
      <rect width="460" height="188" rx="14" fill="#F8FAFC"/>
      <!-- Sidebar -->
      <rect width="112" height="188" rx="14" fill="#FFFFFF"/>
      <rect x="10" y="12" width="92" height="32" rx="8" fill="#EEF2FF"/>
      <rect x="17" y="17" width="16" height="16" rx="5" fill="url(#grad-brand)"/>
      <rect x="38" y="21" width="48" height="7" rx="3" fill="#6366F1"/>
      <!-- sidebar nav dots -->
      <circle cx="22" cy="64" r="4" fill="#6366F1"/>
      <rect x="32" y="60" width="50" height="7" rx="3" fill="#6366F1" opacity="0.6"/>
      <circle cx="22" cy="84" r="4" fill="#8B5CF6" opacity="0.5"/>
      <rect x="32" y="80" width="38" height="7" rx="3" fill="#6B7280" opacity="0.35"/>
      <circle cx="22" cy="104" r="4" fill="#22C55E" opacity="0.7"/>
      <rect x="32" y="100" width="55" height="7" rx="3" fill="#6B7280" opacity="0.35"/>
      <circle cx="22" cy="124" r="4" fill="#F59E0B" opacity="0.6"/>
      <rect x="32" y="120" width="42" height="7" rx="3" fill="#6B7280" opacity="0.35"/>
      <!-- Main stats row -->
      <rect x="120" y="10" width="76" height="60" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
      <rect x="130" y="20" width="40" height="6" rx="3" fill="#6B7280" opacity="0.3"/>
      <rect x="130" y="32" width="56" height="14" rx="4" fill="#6366F1" opacity="0.85"/>
      <rect x="130" y="52" width="28" height="6" rx="3" fill="#22C55E" opacity="0.7"/>
      <rect x="204" y="10" width="76" height="60" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
      <rect x="214" y="20" width="50" height="6" rx="3" fill="#6B7280" opacity="0.3"/>
      <rect x="214" y="32" width="42" height="14" rx="4" fill="#8B5CF6" opacity="0.8"/>
      <rect x="214" y="52" width="34" height="6" rx="3" fill="#22C55E" opacity="0.7"/>
      <rect x="288" y="10" width="76" height="60" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
      <rect x="298" y="20" width="56" height="6" rx="3" fill="#6B7280" opacity="0.3"/>
      <rect x="298" y="32" width="36" height="14" rx="4" fill="#22C55E" opacity="0.8"/>
      <rect x="298" y="52" width="44" height="6" rx="3" fill="#6B7280" opacity="0.3"/>
      <rect x="372" y="10" width="76" height="60" rx="10" fill="#EEF2FF" stroke="#6366F1" stroke-width="1"/>
      <rect x="382" y="26" width="56" height="6" rx="3" fill="#6366F1" opacity="0.5"/>
      <rect x="390" y="38" width="40" height="16" rx="5" fill="url(#grad-brand)"/>
      <!-- Task list -->
      <rect x="120" y="78" width="186" height="100" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
      <rect x="132" y="89" width="72" height="8" rx="4" fill="#111827" opacity="0.7"/>
      <rect x="132" y="107" width="12" height="12" rx="3" fill="#6366F1"/>
      <rect x="150" y="109" width="100" height="7" rx="3" fill="#6B7280" opacity="0.4"/>
      <rect x="132" y="126" width="12" height="12" rx="3" fill="#22C55E"/>
      <rect x="150" y="128" width="80" height="7" rx="3" fill="#6B7280" opacity="0.4"/>
      <rect x="132" y="145" width="12" height="12" rx="3" fill="#F59E0B" opacity="0.8"/>
      <rect x="150" y="147" width="112" height="7" rx="3" fill="#6B7280" opacity="0.4"/>
      <!-- Chart panel -->
      <rect x="314" y="78" width="134" height="100" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
      <rect x="326" y="89" width="64" height="8" rx="4" fill="#111827" opacity="0.7"/>
      <rect x="326" y="132" width="12" height="36" rx="3" fill="#6366F1" opacity="0.25"/>
      <rect x="344" y="120" width="12" height="48" rx="3" fill="#6366F1" opacity="0.45"/>
      <rect x="362" y="110" width="12" height="58" rx="3" fill="#6366F1" opacity="0.65"/>
      <rect x="380" y="104" width="12" height="64" rx="3" fill="#6366F1"/>
      <rect x="398" y="118" width="12" height="50" rx="3" fill="#8B5CF6" opacity="0.6"/>
      <polyline points="332,132 350,120 368,110 386,104 404,118" stroke="#22C55E" stroke-width="2" stroke-linecap="round" fill="none"/>
      <!-- Floating notification -->
      <g filter="url(#shadow-sm)">
        <rect x="190" y="108" width="136" height="46" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="0.5"/>
        <circle cx="208" cy="131" r="10" fill="#DCFCE7"/>
        <path d="M203 131l3.5 3.5 7-7" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="224" y="122" width="72" height="7" rx="3" fill="#111827" opacity="0.8"/>
        <rect x="224" y="134" width="90" height="6" rx="3" fill="#6B7280" opacity="0.4"/>
      </g>
    </g>

    <!-- CTA Button -->
    
  <g id="Button-Primary" transform="translate(230,418)" filter="url(#shadow-btn)">
    <rect width="180" height="46" rx="10" fill="url(#grad-brand)"/>
    <text x="90" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="white">→  Get Started Free</text>
  </g>
  </g>
</svg>