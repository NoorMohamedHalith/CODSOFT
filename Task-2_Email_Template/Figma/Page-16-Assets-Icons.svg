<?xml version="1.0" encoding="UTF-8"?>
<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Page 16 — Assets & Icons</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
    </style>
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(99,102,241,0.08)"/>
    </filter>
    <filter id="shadow-modal">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="#FFFFFF"/>
  
  <!-- Page Header -->
  <rect width="1440" height="80" fill="#FFFFFF"/>
  <line x1="0" y1="79.5" x2="1440" y2="79.5" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Logo -->
  <rect x="40" y="24" width="32" height="32" rx="8" fill="url(#grad-brand)"/>
  <path d="M56 30l-4 2v4a4 4 0 008 0v-4l-4-2z" fill="white"/>
  <text x="82" y="46" font-size="16" font-weight="800" fill="url(#grad-brand)">FlowSphere</text>
  <text x="180" y="45" font-size="14" font-weight="400" fill="#6B7280" opacity="0.5">|</text>
  <text x="196" y="46" font-size="15" font-weight="700" fill="#111827">Vector Assets & Icons library</text>
  <!-- Page number -->
  <rect x="1340" y="24" width="60" height="32" rx="16" fill="#EEF2FF"/>
  <text x="1370" y="45" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">PAGE 16</text>
  

  <!-- Section Title -->
  <text x="80" y="130" font-size="18" font-weight="800" fill="#111827">Custom UI Icons (24×24px)</text>

  <!-- Icons grid -->
  <g transform="translate(80, 160)">
    
      <g transform="translate(0, 0)">
        <rect width="80" height="80" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
        <g transform="translate(28,28) scale(1)" fill="none" stroke="#6366F1" stroke-width="2" stroke-linecap="round">
          <path d="M4 12l5 5 11-11"/>
        </g>
        <text x="40" y="110" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Checkmark</text>
      </g>
    
      <g transform="translate(210, 0)">
        <rect width="80" height="80" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
        <g transform="translate(28,28) scale(1)" fill="none" stroke="#6366F1" stroke-width="2" stroke-linecap="round">
          <path d="M5 12h14m-6-6l6 6-6 6"/>
        </g>
        <text x="40" y="110" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">ArrowRight</text>
      </g>
    
      <g transform="translate(420, 0)">
        <rect width="80" height="80" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
        <g transform="translate(28,28) scale(1)" fill="none" stroke="#6366F1" stroke-width="2" stroke-linecap="round">
          <path d="M12 2L4 6v6c0 4.4 3.6 8 8 8s8-3.6 8-8V6l-8-4z"/>
        </g>
        <text x="40" y="110" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">ShieldLock</text>
      </g>
    
      <g transform="translate(630, 0)">
        <rect width="80" height="80" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
        <g transform="translate(28,28) scale(1)" fill="none" stroke="#6366F1" stroke-width="2" stroke-linecap="round">
          <path d="M4 20h16M4 16h4v4H4zm6-6h4v10h-4zm6-6h4v16h-4z"/>
        </g>
        <text x="40" y="110" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">ProductivityChart</text>
      </g>
    
      <g transform="translate(840, 0)">
        <rect width="80" height="80" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
        <g transform="translate(28,28) scale(1)" fill="none" stroke="#6366F1" stroke-width="2" stroke-linecap="round">
          <path d="M8 8a3 3 0 100-6 3 3 0 000 6zm8 0a3 3 0 100-6 3 3 0 000 6z"/>
        </g>
        <text x="40" y="110" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">TeamCollab</text>
      </g>
    
      <g transform="translate(1050, 0)">
        <rect width="80" height="80" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
        <g transform="translate(28,28) scale(1)" fill="none" stroke="#6366F1" stroke-width="2" stroke-linecap="round">
          <path d="M12 2a4 4 0 014 4v6l2 2H6l2-2V6a4 4 0 014-4z"/>
        </g>
        <text x="40" y="110" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">AlertBell</text>
      </g>
    
  </g>

  <!-- Large dashboard assets preview -->
  <g transform="translate(80, 360)">
    <text x="0" y="30" font-size="18" font-weight="800" fill="#111827">Marketing Badge Illustrations</text>
    
    <g transform="translate(0, 60)" filter="url(#shadow)">
      <rect width="600" height="300" rx="16" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
      <text x="30" y="44" font-size="14" font-weight="700" fill="#111827">Dashboard Widgets previews</text>
      
      <!-- Mini graph -->
      <g transform="translate(30, 80)">
        <rect width="240" height="150" rx="10" fill="white" stroke="#E5E7EB"/>
        <rect x="20" y="20" width="100" height="8" rx="4" fill="#111827" opacity="0.6"/>
        <!-- Chart bars -->
        <rect x="20" y="110" width="14" height="20" rx="2" fill="#6366F1" opacity="0.4"/>
        <rect x="40" y="80" width="14" height="50" rx="2" fill="#6366F1" opacity="0.6"/>
        <rect x="60" y="50" width="14" height="80" rx="2" fill="#6366F1"/>
      </g>
    </g>
  </g>
  
</svg>