<?xml version="1.0" encoding="UTF-8"?>
<svg width="640" height="180" viewBox="0 0 640 180"
     fill="none" xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>FlowSphere — Footer</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
    <!-- Brand gradient -->
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- Hero bg gradient -->
    <linearGradient id="grad-hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <!-- White fade gradient for offer orbs -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Drop shadows -->
    <filter id="shadow-card" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(99,102,241,0.10)"/>
    </filter>
    <filter id="shadow-btn" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(99,102,241,0.35)"/>
    </filter>
    <filter id="shadow-float" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="rgba(99,102,241,0.18)"/>
    </filter>
    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
  </defs>

  <g id="Section-Footer" transform="translate(0,0)">
    <rect width="640" height="180" rx="0" fill="#0F172A"/>

    <!-- Footer Logo -->
    <g transform="translate(245,20)">
      <rect x="0" y="0" width="28" height="28" rx="7" fill="url(#grad-brand)"/>
      <path d="M14 4L8 7v5c0 3.3 2.7 6 6 6s6-2.7 6-6V7l-6-3z" fill="white" fill-opacity="0.9"/>
      <text x="36" y="20" font-size="15" font-weight="700" fill="white">FlowSphere</text>
    </g>

    <!-- Social icons row -->
    
    <g id="Social-Twitter" transform="translate(241,60)">
      <rect width="32" height="32" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <g transform="translate(8,8) scale(1)" fill="rgba(255,255,255,0.75)">
        <path d="M4 2h3l-7.3 8.3 8.6 11.4H5l-5.3-6.9L-1 2H2l4.8 6.3z"/>
      </g>
    </g>
    <g id="Social-LinkedIn" transform="translate(283,60)">
      <rect width="32" height="32" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <g transform="translate(8,8) scale(1)" fill="rgba(255,255,255,0.75)">
        <path d="M1 1h2.7v9H1zm1.35-1.5a1.35 1.35 0 100-2.7 1.35 1.35 0 000 2.7zm4.15 1.5h2.6v1.2h.04C9.5 1.5 10.4.8 11.8.8c2.8 0 3.2 1.8 3.2 4.2V10H12.4V5.5c0-1.1-.5-2.3-1.8-2.3-1.6 0-2 1.3-2 2.3V10H6z"/>
      </g>
    </g>
    <g id="Social-GitHub" transform="translate(325,60)">
      <rect width="32" height="32" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <g transform="translate(8,8) scale(1)" fill="rgba(255,255,255,0.75)">
        <path d="M8 0C3.6 0 0 3.6 0 8c0 3.5 2.3 6.5 5.5 7.6.4.1.5-.2.5-.4v-1.4c-2.2.5-2.7-1-2.7-1-.4-1-.9-1.2-.9-1.2-.7-.5.1-.5.1-.5.8.1 1.2.8 1.2.8.7 1.2 1.8.9 2.3.7.1-.5.3-.9.5-1.1-1.8-.2-3.6-.9-3.6-4 0-.9.3-1.6.8-2.2-.1-.2-.4-1 .1-2.1 0 0 .7-.2 2.2.8.6-.2 1.3-.3 2-.3s1.4.1 2 .3c1.5-1 2.2-.8 2.2-.8.5 1.1.2 1.9.1 2.1.5.6.8 1.3.8 2.2 0 3.1-1.9 3.8-3.7 4 .3.3.6.8.6 1.6v2.4c0 .2.1.5.6.4C13.7 14.5 16 11.5 16 8c0-4.4-3.6-8-8-8z"/>
      </g>
    </g>
    <g id="Social-Instagram" transform="translate(367,60)">
      <rect width="32" height="32" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <g transform="translate(8,8) scale(1)" fill="rgba(255,255,255,0.75)">
        <path d="M8 0C5.8 0 5.6 0 4.7 0 3.9 0 3.3.2 2.9.3 2.4.5 2 .8 1.6 1.2 1.2 1.6.9 2 .7 2.5.6 3 .5 3.6.5 4.4c0 .9 0 1.2 0 3.6s0 2.7 0 3.6c0 .8.1 1.4.3 1.9.1.5.4.9.8 1.3.4.4.8.7 1.3.8.5.2 1.1.3 1.9.3.9 0 1.2 0 3.6 0s2.7 0 3.6 0c.8 0 1.4-.1 1.9-.3.5-.1.9-.4 1.3-.8.4-.4.7-.8.8-1.3.2-.5.3-1.1.3-1.9 0-.9 0-1.2 0-3.6s0-2.7 0-3.6c0-.8-.1-1.4-.3-1.9-.1-.5-.4-.9-.8-1.3C14.6.9 14.2.6 13.7.5 13.2.3 12.6.2 11.8.2 10.9.2 10.7.2 8.3.2 5.9.2 5.7.2 4.8.2c0 0-.7 0 0 0zM8 2a6 6 0 100 12A6 6 0 008 2zm0 2a4 4 0 110 8 4 4 0 010-8zm6.4-2.2a1.4 1.4 0 100 2.8 1.4 1.4 0 000-2.8z"/>
      </g>
    </g>

    <!-- Contact -->
    <text x="320" y="114" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.55)">hello@flowsphere.io  ·  flowsphere.io</text>

    <!-- Footer links -->
    <text x="210" y="135" font-size="11" fill="rgba(255,255,255,0.35)">Privacy Policy</text>
    <text x="302"  y="135" font-size="11" fill="rgba(255,255,255,0.25)">·</text>
    <text x="310"  y="135" font-size="11" fill="rgba(255,255,255,0.35)">Terms of Service</text>
    <text x="405"  y="135" font-size="11" fill="rgba(255,255,255,0.25)">·</text>
    <text x="415"  y="135" font-size="11" fill="rgba(255,255,255,0.35)">Unsubscribe</text>

    <!-- Copyright -->
    <text x="320" y="158" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.22)">© 2025 FlowSphere, Inc. All rights reserved.</text>
    <text x="320" y="172" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.18)">CODSOFT UI/UX Internship · Task 2 · Designed by Noor Mohamed Halith</text>
  </g>
</svg>