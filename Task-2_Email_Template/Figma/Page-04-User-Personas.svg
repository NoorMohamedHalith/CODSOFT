<?xml version="1.0" encoding="UTF-8"?>
<svg width="1440" height="1080" viewBox="0 0 1440 1080" fill="none"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Page 4 — User Personas</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
    </style>
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(99,102,241,0.08)"/>
    </filter>
    <filter id="shadow-modal">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>

  <rect width="1440" height="1080" fill="#FFFFFF"/>
  
  <!-- Page Header -->
  <rect width="1440" height="80" fill="#FFFFFF"/>
  <line x1="0" y1="79.5" x2="1440" y2="79.5" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Logo -->
  <rect x="40" y="24" width="32" height="32" rx="8" fill="url(#grad-brand)"/>
  <path d="M56 30l-4 2v4a4 4 0 008 0v-4l-4-2z" fill="white"/>
  <text x="82" y="46" font-size="16" font-weight="800" fill="url(#grad-brand)">FlowSphere</text>
  <text x="180" y="45" font-size="14" font-weight="400" fill="#6B7280" opacity="0.5">|</text>
  <text x="196" y="46" font-size="15" font-weight="700" fill="#111827">User Persona Profiles</text>
  <!-- Page number -->
  <rect x="1340" y="24" width="60" height="32" rx="16" fill="#EEF2FF"/>
  <text x="1370" y="45" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">PAGE 04</text>
  

  <!-- Persona 1: Sarah -->
  <g transform="translate(80, 140)" filter="url(#shadow)">
    <rect width="600" height="840" rx="24" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    
    <!-- Profile Card header -->
    <rect width="600" height="180" rx="24 24 0 0" fill="url(#grad-brand)"/>
    <circle cx="80" cy="90" r="44" fill="white" opacity="0.2"/>
    <text x="80" y="100" font-size="32" font-weight="800" fill="white" text-anchor="middle">SC</text>
    <text x="150" y="80" font-size="24" font-weight="800" fill="white">Sarah Chen</text>
    <text x="150" y="106" font-size="13" fill="rgba(255,255,255,0.8)">Marketing Operations Lead · Nexus Labs</text>
    <rect x="150" y="122" width="110" height="22" rx="11" fill="rgba(255,255,255,0.15)"/>
    <text x="205" y="136" font-size="10.5" font-weight="700" fill="white" text-anchor="middle">POWER USER</text>

    <!-- Bio & Details -->
    <g transform="translate(40, 220)">
      <text x="0" y="20" font-size="12" font-weight="700" fill="#6366F1" letter-spacing="1">BIO</text>
      <text x="0" y="44" font-size="13" fill="#6B7280" line-height="1.6">Sarah coordinates campaigns across 8 remote team members. She gets</text>
      <text x="0" y="64" font-size="13" fill="#6B7280">over 150 notifications daily and is highly sensitive to clutter.</text>

      <text x="0" y="120" font-size="12" font-weight="700" fill="#6366F1" letter-spacing="1">GOALS</text>
      <text x="0" y="144" font-size="13" fill="#111827">✓ Sync workflow states instantly across teams</text>
      <text x="0" y="166" font-size="13" fill="#111827">✓ Automate weekly metrics visual reports</text>
      <text x="0" y="188" font-size="13" fill="#111827">✓ Integrate task states with existing Slack channels</text>

      <text x="0" y="250" font-size="12" font-weight="700" fill="#6366F1" letter-spacing="1">PAIN POINTS</text>
      <text x="0" y="274" font-size="13" fill="#EF4444">✗ Complex welcome forms causing tool setup drop-off</text>
      <text x="0" y="296" font-size="13" fill="#EF4444">✗ Low accessibility templates rendering bad contrast on mobile</text>
      <text x="0" y="318" font-size="13" fill="#EF4444">✗ Unclear trial periods leading to billing surprises</text>
      
      <!-- Tech scale -->
      <text x="0" y="380" font-size="12" font-weight="700" fill="#6366F1" letter-spacing="1">TECH SAVVINESS</text>
      <rect x="0" y="400" width="520" height="8" rx="4" fill="#E5E7EB"/>
      <rect x="0" y="400" width="460" height="8" rx="4" fill="url(#grad-brand)"/>
      <text x="520" y="394" font-size="11" fill="#6B7280" text-anchor="end">Expert</text>
    </g>
  </g>

  <!-- Persona 2: Marcus -->
  <g transform="translate(760, 140)" filter="url(#shadow)">
    <rect width="600" height="840" rx="24" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    
    <!-- Profile Card header -->
    <rect width="600" height="180" rx="24 24 0 0" fill="#0F172A"/>
    <circle cx="80" cy="90" r="44" fill="white" opacity="0.1"/>
    <text x="80" y="100" font-size="32" font-weight="800" fill="white" text-anchor="middle">MR</text>
    <text x="150" y="80" font-size="24" font-weight="800" fill="white">Marcus Rivera</text>
    <text x="150" y="106" font-size="13" fill="rgba(255,255,255,0.7)">Product Lead · Velocity Inc</text>
    <rect x="150" y="122" width="110" height="22" rx="11" fill="rgba(255,255,255,0.15)"/>
    <text x="205" y="136" font-size="10.5" font-weight="700" fill="white" text-anchor="middle">DECISION MAKER</text>

    <!-- Bio & Details -->
    <g transform="translate(40, 220)">
      <text x="0" y="20" font-size="12" font-weight="700" fill="#6366F1" letter-spacing="1">BIO</text>
      <text x="0" y="44" font-size="13" fill="#6B7280" line-height="1.6">Marcus seeks lightweight tools to boost startup agility. He prioritizes</text>
      <text x="0" y="64" font-size="13" fill="#6B7280">integration features and evaluates budget options closely.</text>

      <text x="0" y="120" font-size="12" font-weight="700" fill="#6366F1" letter-spacing="1">GOALS</text>
      <text x="0" y="144" font-size="13" fill="#111827">✓ Minimize tool integration cycles to hours instead of days</text>
      <text x="0" y="166" font-size="13" fill="#111827">✓ Maximize collaboration spaces on flat team budgets</text>
      <text x="0" y="188" font-size="13" fill="#111827">✓ Track team milestones without manual status updates</text>

      <text x="0" y="250" font-size="12" font-weight="700" fill="#6366F1" letter-spacing="1">PAIN POINTS</text>
      <text x="0" y="274" font-size="13" fill="#EF4444">✗ Obscure welcome flows with no links to feature lists</text>
      <text x="0" y="296" font-size="13" fill="#EF4444">✗ Complex dashboards with high startup onboarding times</text>
      <text x="0" y="318" font-size="13" fill="#EF4444">✗ Missing native app options causing remote connection lapses</text>
      
      <!-- Tech scale -->
      <text x="0" y="380" font-size="12" font-weight="700" fill="#6366F1" letter-spacing="1">TECH SAVVINESS</text>
      <rect x="0" y="400" width="520" height="8" rx="4" fill="#E5E7EB"/>
      <rect x="0" y="400" width="380" height="8" rx="4" fill="#6366F1"/>
      <text x="520" y="394" font-size="11" fill="#6B7280" text-anchor="end">Advanced</text>
    </g>
  </g>
  
</svg>