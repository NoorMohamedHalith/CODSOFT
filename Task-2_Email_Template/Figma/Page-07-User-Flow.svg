<?xml version="1.0" encoding="UTF-8"?>
<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Page 7 — User Flow</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
    </style>
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(99,102,241,0.08)"/>
    </filter>
    <filter id="shadow-modal">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="#FFFFFF"/>
  
  <!-- Page Header -->
  <rect width="1440" height="80" fill="#FFFFFF"/>
  <line x1="0" y1="79.5" x2="1440" y2="79.5" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Logo -->
  <rect x="40" y="24" width="32" height="32" rx="8" fill="url(#grad-brand)"/>
  <path d="M56 30l-4 2v4a4 4 0 008 0v-4l-4-2z" fill="white"/>
  <text x="82" y="46" font-size="16" font-weight="800" fill="url(#grad-brand)">FlowSphere</text>
  <text x="180" y="45" font-size="14" font-weight="400" fill="#6B7280" opacity="0.5">|</text>
  <text x="196" y="46" font-size="15" font-weight="700" fill="#111827">User Action & Modal Decision Flow</text>
  <!-- Page number -->
  <rect x="1340" y="24" width="60" height="32" rx="16" fill="#EEF2FF"/>
  <text x="1370" y="45" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">PAGE 07</text>
  

  <g transform="translate(80, 140)">
    <!-- Stage boxes -->
    <!-- Start -->
    <g transform="translate(0, 120)">
      <rect width="140" height="50" rx="25" fill="#0F172A"/>
      <text x="70" y="30" font-size="12" font-weight="700" fill="white" text-anchor="middle">Email Opens</text>
    </g>
    
    <!-- Step 2: Read Hero -->
    <g transform="translate(200, 120)">
      <rect width="140" height="50" rx="8" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1.5"/>
      <text x="70" y="30" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">Read Hero</text>
    </g>

    <!-- Diamond 1: Interested? -->
    <g transform="translate(400, 105)">
      <path d="M 70 0 L 140 40 L 70 80 L 0 40 Z" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
      <text x="70" y="44" font-size="11" font-weight="700" fill="#6366F1" text-anchor="middle">Convert?</text>
    </g>

    <!-- Yes path: Clicks CTA -->
    <g transform="translate(600, 50)">
      <rect width="160" height="50" rx="8" fill="#6366F1" stroke="none"/>
      <text x="80" y="30" font-size="12" font-weight="700" fill="white" text-anchor="middle">Clicks "Get Started"</text>
    </g>
    <!-- Modal success -->
    <g transform="translate(820, 50)">
      <rect width="160" height="50" rx="8" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
      <text x="80" y="30" font-size="12" font-weight="700" fill="#22C55E" text-anchor="middle">Success Overlay</text>
    </g>

    <!-- No path: Scroll Features -->
    <g transform="translate(600, 190)">
      <rect width="160" height="50" rx="8" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1.5"/>
      <text x="80" y="30" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">Scrolls Features</text>
    </g>
    
    <!-- Step 3: Special Offer -->
    <g transform="translate(820, 190)">
      <rect width="160" height="50" rx="8" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1.5"/>
      <text x="80" y="30" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">Special Offer banner</text>
    </g>

    <!-- Diamond 2: Trial claim? -->
    <g transform="translate(1040, 175)">
      <path d="M 70 0 L 140 40 L 70 80 L 0 40 Z" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
      <text x="70" y="44" font-size="11" font-weight="700" fill="#6366F1" text-anchor="middle">Claim Trial?</text>
    </g>

    <!-- Yes path: Clicks Offer -->
    <g transform="translate(1040, 310)">
      <rect width="160" height="50" rx="8" fill="#6366F1" stroke="none"/>
      <text x="80" y="30" font-size="12" font-weight="700" fill="white" text-anchor="middle">Clicks "Claim Now"</text>
    </g>
    <!-- Modal active -->
    <g transform="translate(1040, 410)">
      <rect width="160" height="50" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
      <text x="80" y="30" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">Offer Modal (Timer)</text>
    </g>

    <!-- Connectors -->
    <!-- Start to Hero -->
    <path d="M 140 145 L 200 145" stroke="#6B7280" stroke-width="2" fill="none"/>
    <!-- Hero to Diamond -->
    <path d="M 340 145 L 400 145" stroke="#6B7280" stroke-width="2" fill="none"/>
    <!-- Diamond to Yes -->
    <path d="M 470 105 L 470 75 L 600 75" stroke="#22C55E" stroke-width="2" fill="none"/>
    <text x="490" y="70" font-size="10" fill="#22C55E" font-weight="700">YES</text>
    <!-- Diamond to No -->
    <path d="M 470 185 L 470 215 L 600 215" stroke="#EF4444" stroke-width="2" fill="none"/>
    <text x="490" y="210" font-size="10" fill="#EF4444" font-weight="700">NO</text>
    <!-- Yes to success -->
    <path d="M 760 75 L 820 75" stroke="#6B7280" stroke-width="2" fill="none"/>
    <!-- No to offer -->
    <path d="M 760 215 L 820 215" stroke="#6B7280" stroke-width="2" fill="none"/>
    <!-- Offer to Diamond 2 -->
    <path d="M 980 215 L 1040 215" stroke="#6B7280" stroke-width="2" fill="none"/>
    <!-- Diamond 2 to Claim CTA -->
    <path d="M 1110 255 L 1110 310" stroke="#22C55E" stroke-width="2" fill="none"/>
    <!-- CTA to Modal -->
    <path d="M 1110 360 L 1110 410" stroke="#6B7280" stroke-width="2" fill="none"/>

    <!-- Legend -->
    <g transform="translate(0, 560)">
      <rect width="400" height="80" rx="8" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
      <circle cx="20" cy="40" r="8" fill="#0F172A"/>
      <text x="36" y="44" font-size="11" font-weight="600" fill="#111827">Trigger</text>
      <rect x="100" y="32" width="50" height="16" rx="4" fill="#F8FAFC" stroke="#E5E7EB"/>
      <text x="160" y="44" font-size="11" font-weight="600" fill="#111827">State/Action</text>
      <path d="M 240 28 L 270 40 L 240 52 Z" fill="#EEF2FF"/>
      <text x="280" y="44" font-size="11" font-weight="600" fill="#111827">Decision</text>
    </g>
  </g>
  
</svg>