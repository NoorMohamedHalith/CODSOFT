<?xml version="1.0" encoding="UTF-8"?>
<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Page 6 — Information Architecture</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
    </style>
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(99,102,241,0.08)"/>
    </filter>
    <filter id="shadow-modal">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="#FFFFFF"/>
  
  <!-- Page Header -->
  <rect width="1440" height="80" fill="#FFFFFF"/>
  <line x1="0" y1="79.5" x2="1440" y2="79.5" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Logo -->
  <rect x="40" y="24" width="32" height="32" rx="8" fill="url(#grad-brand)"/>
  <path d="M56 30l-4 2v4a4 4 0 008 0v-4l-4-2z" fill="white"/>
  <text x="82" y="46" font-size="16" font-weight="800" fill="url(#grad-brand)">FlowSphere</text>
  <text x="180" y="45" font-size="14" font-weight="400" fill="#6B7280" opacity="0.5">|</text>
  <text x="196" y="46" font-size="15" font-weight="700" fill="#111827">Email Structure & Information Architecture</text>
  <!-- Page number -->
  <rect x="1340" y="24" width="60" height="32" rx="16" fill="#EEF2FF"/>
  <text x="1370" y="45" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">PAGE 06</text>
  

  <!-- Tree Diagram -->
  <g transform="translate(80, 140)">
    <!-- Root node -->
    <g transform="translate(540, 20)">
      <rect width="200" height="50" rx="10" fill="url(#grad-brand)"/>
      <text x="100" y="31" font-size="14" font-weight="800" fill="white" text-anchor="middle">FlowSphere Email</text>
    </g>

    <!-- Tier 2 nodes -->
    <!-- Header -->
    <g transform="translate(40, 150)">
      <rect width="140" height="40" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="1"/>
      <text x="70" y="25" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">1. Header</text>
    </g>
    <!-- Hero -->
    <g transform="translate(220, 150)">
      <rect width="140" height="40" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="1"/>
      <text x="70" y="25" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">2. Hero Section</text>
    </g>
    <!-- Features -->
    <g transform="translate(400, 150)">
      <rect width="140" height="40" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="1"/>
      <text x="70" y="25" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">3. Features list</text>
    </g>
    <!-- Offer -->
    <g transform="translate(580, 150)">
      <rect width="140" height="40" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="1"/>
      <text x="70" y="25" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">4. Special Offer</text>
    </g>
    <!-- Testimonials -->
    <g transform="translate(760, 150)">
      <rect width="140" height="40" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="1"/>
      <text x="70" y="25" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">5. Testimonials</text>
    </g>
    <!-- Download -->
    <g transform="translate(940, 150)">
      <rect width="140" height="40" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="1"/>
      <text x="70" y="25" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">6. Download app</text>
    </g>
    <!-- Footer -->
    <g transform="translate(1120, 150)">
      <rect width="140" height="40" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="1"/>
      <text x="70" y="25" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">7. Footer</text>
    </g>

    <!-- Connectors Tier 1 to 2 -->
    <path d="M 640 70 L 640 110 M 110 110 L 1190 110 M 110 110 L 110 150 M 290 110 L 290 150 M 470 110 L 470 150 M 650 110 L 650 150 M 830 110 L 830 150 M 1010 110 L 1010 150 M 1190 110 L 1190 150" stroke="#6366F1" stroke-width="1.5" fill="none"/>

    <!-- Tier 3 details under nodes -->
    <g transform="translate(40, 220)">
      <text x="10" y="20" font-size="11" fill="#6B7280">· Logo Brand</text>
      <text x="10" y="40" font-size="11" fill="#6B7280">· Nav items</text>
    </g>
    <g transform="translate(220, 220)">
      <text x="10" y="20" font-size="11" fill="#6B7280">· Title &amp; Subtitle</text>
      <text x="10" y="40" font-size="11" fill="#6B7280">· Dashboard SVG</text>
      <text x="10" y="60" font-size="11" fill="#6B7280">· CTA Primary</text>
    </g>
    <g transform="translate(400, 220)">
      <text x="10" y="20" font-size="11" fill="#6B7280">· Smart Tasks</text>
      <text x="10" y="40" font-size="11" fill="#6B7280">· Team Collab</text>
      <text x="10" y="60" font-size="11" fill="#6B7280">· Analytics</text>
    </g>
    <g transform="translate(580, 220)">
      <text x="10" y="20" font-size="11" fill="#6B7280">· 30 Days Free</text>
      <text x="10" y="40" font-size="11" fill="#6B7280">· Countdown tag</text>
      <text x="10" y="60" font-size="11" fill="#6B7280">· Claim CTA</text>
    </g>
    <g transform="translate(760, 220)">
      <text x="10" y="20" font-size="11" fill="#6B7280">· 2 review cards</text>
      <text x="10" y="40" font-size="11" fill="#6B7280">· Stars rating</text>
      <text x="10" y="60" font-size="11" fill="#6B7280">· Avatars</text>
    </g>
    <g transform="translate(940, 220)">
      <text x="10" y="20" font-size="11" fill="#6B7280">· Google Play badge</text>
      <text x="10" y="40" font-size="11" fill="#6B7280">· App Store badge</text>
    </g>
    <g transform="translate(1120, 220)">
      <text x="10" y="20" font-size="11" fill="#6B7280">· Social icons</text>
      <text x="10" y="40" font-size="11" fill="#6B7280">· Website link</text>
      <text x="10" y="60" font-size="11" fill="#6B7280">· Unsubscribe</text>
    </g>
  </g>

  <!-- Hierarchy details card -->
  <g transform="translate(80, 580)">
    <rect width="1280" height="240" rx="16" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    <text x="40" y="40" font-size="14" font-weight="700" fill="#111827">Structural Decisions</text>
    
    <g transform="translate(40, 70)">
      <text x="0" y="20" font-size="12" font-weight="700" fill="#6366F1">1. PRIORITY FLOW</text>
      <text x="0" y="44" font-size="13" fill="#6B7280">The hierarchy is structured dynamically so</text>
      <text x="0" y="64" font-size="13" fill="#6B7280">the user sees the primary value proposition</text>
      <text x="0" y="84" font-size="13" fill="#6B7280">immediately (Hero CTA), followed by supporting</text>
      <text x="0" y="104" font-size="13" fill="#6B7280">proof points (Features, Testimonials).</text>
    </g>
    <g transform="translate(440, 70)">
      <text x="0" y="20" font-size="12" font-weight="700" fill="#6366F1">2. REDUNDANT CTA ROUTING</text>
      <text x="0" y="44" font-size="13" fill="#6B7280">We deploy CTAs both in the Hero and Special</text>
      <text x="0" y="64" font-size="13" fill="#6B7280">Offer sections. This satisfies both impulse</text>
      <text x="0" y="84" font-size="13" fill="#6B7280">signups and analytical users who need to read</text>
      <text x="0" y="104" font-size="13" fill="#6B7280">features before conversion.</text>
    </g>
    <g transform="translate(840, 70)">
      <text x="0" y="20" font-size="12" font-weight="700" fill="#6366F1">3. DRAIN-PIPE FOOTER</text>
      <text x="0" y="44" font-size="13" fill="#6B7280">All administrative elements (unsubscribe,</text>
      <text x="0" y="64" font-size="13" fill="#6B7280">terms, policy) are safely relegated to the</text>
      <text x="0" y="84" font-size="13" fill="#6B7280">footer to maintain focused marketing metrics</text>
      <text x="0" y="104" font-size="13" fill="#6B7280">without visual obstruction.</text>
    </g>
  </g>
  
</svg>