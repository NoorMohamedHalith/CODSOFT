<?xml version="1.0" encoding="UTF-8"?>
<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Page 2 — Project Overview</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
    </style>
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(99,102,241,0.08)"/>
    </filter>
    <filter id="shadow-modal">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="#FFFFFF"/>
  
  <!-- Page Header -->
  <rect width="1440" height="80" fill="#FFFFFF"/>
  <line x1="0" y1="79.5" x2="1440" y2="79.5" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Logo -->
  <rect x="40" y="24" width="32" height="32" rx="8" fill="url(#grad-brand)"/>
  <path d="M56 30l-4 2v4a4 4 0 008 0v-4l-4-2z" fill="white"/>
  <text x="82" y="46" font-size="16" font-weight="800" fill="url(#grad-brand)">FlowSphere</text>
  <text x="180" y="45" font-size="14" font-weight="400" fill="#6B7280" opacity="0.5">|</text>
  <text x="196" y="46" font-size="15" font-weight="700" fill="#111827">Project Overview & Design Process</text>
  <!-- Page number -->
  <rect x="1340" y="24" width="60" height="32" rx="16" fill="#EEF2FF"/>
  <text x="1370" y="45" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">PAGE 02</text>
  

  <!-- Brief card (Left) -->
  <g transform="translate(80, 140)" filter="url(#shadow)">
    <rect width="400" height="660" rx="20" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    <text x="40" y="60" font-size="13" font-weight="700" fill="#6366F1" letter-spacing="1">PROJECT BRIEF</text>
    <text x="40" y="100" font-size="28" font-weight="800" fill="#111827">The Challenge</text>
    <text x="40" y="150" font-size="14" fill="#6B7280" line-height="1.6">
      FlowSphere launched its new productivity platform,
    </text>
    <text x="40" y="172" font-size="14" fill="#6B7280">but onboarding drop-off was high due to standard,</text>
    <text x="40" y="194" font-size="14" fill="#6B7280">generic welcome emails. The target was to create</text>
    <text x="40" y="216" font-size="14" fill="#6B7280">a premium, responsive, highly converting welcome</text>
    <text x="40" y="238" font-size="14" fill="#6B7280">flow with clean components and live interactive states.</text>

    <!-- Goal box -->
    <rect x="40" y="290" width="320" height="150" rx="12" fill="#EEF2FF" stroke="#6366F1" stroke-width="1"/>
    <text x="60" y="326" font-size="14" font-weight="800" fill="#6366F1">THE GOAL</text>
    <text x="60" y="360" font-size="13" fill="#111827">Design a unique email template</text>
    <text x="60" y="380" font-size="13" fill="#111827">optimized for 60% open rates,</text>
    <text x="60" y="400" font-size="13" fill="#111827">featuring custom SVG assets</text>
    <text x="60" y="420" font-size="13" fill="#111827">and clear modal prototypes.</text>
  </g>

  <!-- Metrics & Process (Right) -->
  <g transform="translate(520, 140)">
    <!-- Metric cards -->
    <g transform="translate(0, 0)">
      
        <g transform="translate(0, 0)" filter="url(#shadow)">
          <rect width="380" height="110" rx="16" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
          <text x="30" y="42" font-size="12" font-weight="600" fill="#6B7280" letter-spacing="0.5">TIMELINE</text>
          <text x="30" y="78" font-size="20" font-weight="800" fill="#111827">2 Weeks</text>
        </g>
      
        <g transform="translate(420, 0)" filter="url(#shadow)">
          <rect width="380" height="110" rx="16" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
          <text x="30" y="42" font-size="12" font-weight="600" fill="#6B7280" letter-spacing="0.5">DELIVERABLE</text>
          <text x="30" y="78" font-size="20" font-weight="800" fill="#111827">Email System</text>
        </g>
      
        <g transform="translate(0, 140)" filter="url(#shadow)">
          <rect width="380" height="110" rx="16" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
          <text x="30" y="42" font-size="12" font-weight="600" fill="#6B7280" letter-spacing="0.5">TARGET AUDIENCE</text>
          <text x="30" y="78" font-size="20" font-weight="800" fill="#111827">SaaS Teams</text>
        </g>
      
        <g transform="translate(420, 140)" filter="url(#shadow)">
          <rect width="380" height="110" rx="16" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
          <text x="30" y="42" font-size="12" font-weight="600" fill="#6B7280" letter-spacing="0.5">UX METHODOLOGY</text>
          <text x="30" y="78" font-size="20" font-weight="800" fill="#111827">Double Diamond</text>
        </g>
      
    </g>

    <!-- Design Process Flow diagram -->
    <g transform="translate(0, 320)">
      <text x="0" y="40" font-size="18" font-weight="800" fill="#111827">The Design Journey</text>
      
      <g transform="translate(0, 80)">
        
          <g transform="translate(0, 0)">
            <rect width="110" height="90" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
            <circle cx="55" cy="30" r="16" fill="#EEF2FF"/>
            <text x="55" y="34" font-size="11" font-weight="700" fill="#6366F1" text-anchor="middle">1</text>
            <text x="55" y="70" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Research</text>
          </g>
          <path d="M 118 45 L 128 45" stroke="#6366F1" stroke-width="2" stroke-dasharray="3 3"/>
        
          <g transform="translate(136, 0)">
            <rect width="110" height="90" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
            <circle cx="55" cy="30" r="16" fill="#EEF2FF"/>
            <text x="55" y="34" font-size="11" font-weight="700" fill="#6366F1" text-anchor="middle">2</text>
            <text x="55" y="70" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Define</text>
          </g>
          <path d="M 254 45 L 264 45" stroke="#6366F1" stroke-width="2" stroke-dasharray="3 3"/>
        
          <g transform="translate(272, 0)">
            <rect width="110" height="90" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
            <circle cx="55" cy="30" r="16" fill="#EEF2FF"/>
            <text x="55" y="34" font-size="11" font-weight="700" fill="#6366F1" text-anchor="middle">3</text>
            <text x="55" y="70" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Ideate</text>
          </g>
          <path d="M 390 45 L 400 45" stroke="#6366F1" stroke-width="2" stroke-dasharray="3 3"/>
        
          <g transform="translate(408, 0)">
            <rect width="110" height="90" rx="12" fill="url(#grad-brand)" stroke="#E5E7EB" stroke-width="1"/>
            <circle cx="55" cy="30" r="16" fill="white"/>
            <text x="55" y="34" font-size="11" font-weight="700" fill="#6366F1" text-anchor="middle">4</text>
            <text x="55" y="70" font-size="12" font-weight="700" fill="white" text-anchor="middle">Design</text>
          </g>
          <path d="M 526 45 L 536 45" stroke="#6366F1" stroke-width="2" stroke-dasharray="3 3"/>
        
          <g transform="translate(544, 0)">
            <rect width="110" height="90" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
            <circle cx="55" cy="30" r="16" fill="#EEF2FF"/>
            <text x="55" y="34" font-size="11" font-weight="700" fill="#6366F1" text-anchor="middle">5</text>
            <text x="55" y="70" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Test</text>
          </g>
          <path d="M 662 45 L 672 45" stroke="#6366F1" stroke-width="2" stroke-dasharray="3 3"/>
        
          <g transform="translate(680, 0)">
            <rect width="110" height="90" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
            <circle cx="55" cy="30" r="16" fill="#EEF2FF"/>
            <text x="55" y="34" font-size="11" font-weight="700" fill="#6366F1" text-anchor="middle">6</text>
            <text x="55" y="70" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Deliver</text>
          </g>
          
        
      </g>
    </g>
  </g>
  
</svg>