<?xml version="1.0" encoding="UTF-8"?>
<svg width="1440" height="1080" viewBox="0 0 1440 1080" fill="none"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Page 8 — Low-Fidelity Wireframes</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
    </style>
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(99,102,241,0.08)"/>
    </filter>
    <filter id="shadow-modal">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>

  <rect width="1440" height="1080" fill="#FFFFFF"/>
  
  <!-- Page Header -->
  <rect width="1440" height="80" fill="#FFFFFF"/>
  <line x1="0" y1="79.5" x2="1440" y2="79.5" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Logo -->
  <rect x="40" y="24" width="32" height="32" rx="8" fill="url(#grad-brand)"/>
  <path d="M56 30l-4 2v4a4 4 0 008 0v-4l-4-2z" fill="white"/>
  <text x="82" y="46" font-size="16" font-weight="800" fill="url(#grad-brand)">FlowSphere</text>
  <text x="180" y="45" font-size="14" font-weight="400" fill="#6B7280" opacity="0.5">|</text>
  <text x="196" y="46" font-size="15" font-weight="700" fill="#111827">Low-Fidelity Structure Layouts</text>
  <!-- Page number -->
  <rect x="1340" y="24" width="60" height="32" rx="16" fill="#EEF2FF"/>
  <text x="1370" y="45" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">PAGE 08</text>
  

  <!-- Desktop Wireframe -->
  <g transform="translate(120, 140)">
    <text x="0" y="24" font-size="16" font-weight="700" fill="#111827">Desktop Layout (640px)</text>
    <rect x="0" y="48" width="400" height="800" rx="12" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4 4"/>
    
    <!-- Wireframe blocks -->
    <rect x="16" y="64" width="368" height="40" rx="6" fill="#F1F5F9"/>
    <text x="200" y="88" font-size="11" font-weight="600" fill="#6B7280" text-anchor="middle">[Logo + Nav Links]</text>

    <rect x="16" y="120" width="368" height="240" rx="6" fill="#F1F5F9"/>
    <text x="200" y="240" font-size="11" font-weight="600" fill="#6B7280" text-anchor="middle">[Hero: Title + Tag + SVG illustration + CTA]</text>

    <rect x="16" y="376" width="368" height="130" rx="6" fill="#F1F5F9"/>
    <text x="200" y="440" font-size="11" font-weight="600" fill="#6B7280" text-anchor="middle">[3 Features cards grid]</text>

    <rect x="16" y="522" width="368" height="110" rx="6" fill="#F1F5F9"/>
    <text x="200" y="580" font-size="11" font-weight="600" fill="#6B7280" text-anchor="middle">[Offer Banner with Countdown CTA]</text>

    <rect x="16" y="648" width="368" height="100" rx="6" fill="#F1F5F9"/>
    <text x="200" y="700" font-size="11" font-weight="600" fill="#6B7280" text-anchor="middle">[2 Testimonial reviews + download badges]</text>

    <rect x="16" y="764" width="368" height="68" rx="6" fill="#F1F5F9"/>
    <text x="200" y="800" font-size="11" font-weight="600" fill="#6B7280" text-anchor="middle">[Footer: links + social]</text>
  </g>

  <!-- Mobile Wireframe -->
  <g transform="translate(680, 140)">
    <text x="0" y="24" font-size="16" font-weight="700" fill="#111827">Mobile Layout (375px)</text>
    <rect x="0" y="48" width="280" height="800" rx="12" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4 4"/>

    <!-- Wireframe blocks stacked -->
    <rect x="12" y="64" width="256" height="40" rx="6" fill="#F1F5F9"/>
    <text x="140" y="88" font-size="10" fill="#6B7280" text-anchor="middle">[Logo + Menu]</text>

    <rect x="12" y="116" width="256" height="210" rx="6" fill="#F1F5F9"/>
    <text x="140" y="220" font-size="10" fill="#6B7280" text-anchor="middle">[Hero Title + CTA]</text>

    <rect x="12" y="338" width="256" height="180" rx="6" fill="#F1F5F9"/>
    <text x="140" y="430" font-size="10" fill="#6B7280" text-anchor="middle">[3 Feature rows stacked]</text>

    <rect x="12" y="530" width="256" height="120" rx="6" fill="#F1F5F9"/>
    <text x="140" y="590" font-size="10" fill="#6B7280" text-anchor="middle">[Special Offer banner]</text>

    <rect x="12" y="662" width="256" height="110" rx="6" fill="#F1F5F9"/>
    <text x="140" y="720" font-size="10" fill="#6B7280" text-anchor="middle">[Footer social + copyright]</text>
  </g>

  <!-- Annotations panel -->
  <g transform="translate(1020, 188)">
    <rect width="340" height="752" rx="16" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    <text x="30" y="40" font-size="14" font-weight="700" fill="#111827">Wireframe Annotations</text>
    
    <g transform="translate(30, 80)">
      
        <g transform="translate(0, 0)">
          <circle cx="16" cy="16" r="16" fill="#6366F1"/>
          <text x="16" y="20" font-size="12" font-weight="700" fill="white" text-anchor="middle">1</text>
          <text x="44" y="18" font-size="12.5" font-weight="700" fill="#111827">Header logo alignment</text>
          <text x="44" y="38" font-size="11.5" fill="#6B7280">Main brand asset placed top left to</text>
          <text x="44" y="54" font-size="11.5" fill="#6B7280"> establish trust instantly.</text>
        </g>
      
        <g transform="translate(0, 150)">
          <circle cx="16" cy="16" r="16" fill="#6366F1"/>
          <text x="16" y="20" font-size="12" font-weight="700" fill="white" text-anchor="middle">2</text>
          <text x="44" y="18" font-size="12.5" font-weight="700" fill="#111827">Single column feature stacking</text>
          <text x="44" y="38" font-size="11.5" fill="#6B7280">3-column feature grid stacks into 1</text>
          <text x="44" y="54" font-size="11.5" fill="#6B7280">-column layout on mobile breakpoints (375px).</text>
        </g>
      
        <g transform="translate(0, 300)">
          <circle cx="16" cy="16" r="16" fill="#6366F1"/>
          <text x="16" y="20" font-size="12" font-weight="700" fill="white" text-anchor="middle">3</text>
          <text x="44" y="18" font-size="12.5" font-weight="700" fill="#111827">Call-to-Action contrast</text>
          <text x="44" y="38" font-size="11.5" fill="#6B7280">High-contrast primary buttons with </text>
          <text x="44" y="54" font-size="11.5" fill="#6B7280">soft shadows for instant target clickability.</text>
        </g>
      
        <g transform="translate(0, 450)">
          <circle cx="16" cy="16" r="16" fill="#6366F1"/>
          <text x="16" y="20" font-size="12" font-weight="700" fill="white" text-anchor="middle">4</text>
          <text x="44" y="18" font-size="12.5" font-weight="700" fill="#111827">Compact vertical height</text>
          <text x="44" y="38" font-size="11.5" fill="#6B7280">Total vertical height on mobile is </text>
          <text x="44" y="54" font-size="11.5" fill="#6B7280">compressed to 1400px to avoid scroll fatigue.</text>
        </g>
      
    </g>
  </g>
  
</svg>