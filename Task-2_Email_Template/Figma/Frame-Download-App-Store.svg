<?xml version="1.0" encoding="UTF-8"?>
<svg width="440" height="340" viewBox="0 0 440 340"
     fill="none" xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>FlowSphere — App Store Popup</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
    <!-- Brand gradient -->
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- Hero bg gradient -->
    <linearGradient id="grad-hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <!-- White fade gradient for offer orbs -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Drop shadows -->
    <filter id="shadow-card" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(99,102,241,0.10)"/>
    </filter>
    <filter id="shadow-btn" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(99,102,241,0.35)"/>
    </filter>
    <filter id="shadow-float" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="rgba(99,102,241,0.18)"/>
    </filter>
    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
  </defs>

  <rect width="440" height="340" rx="16" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <g transform="translate(160, 30)">
    <rect width="120" height="120" rx="10" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="15" y="15" width="30" height="30" fill="#8B5CF6"/>
    <rect x="75" y="15" width="30" height="30" fill="#8B5CF6"/>
    <rect x="15" y="75" width="30" height="30" fill="#8B5CF6"/>
  </g>
  <text x="220" y="180" text-anchor="middle" font-size="16" font-weight="800" fill="#111827">Get FlowSphere for iOS</text>
  <text x="220" y="204" text-anchor="middle" font-size="12" fill="#6B7280">Scan this QR code with your iPhone camera to download.</text>
  
  <g transform="translate(24, 230)">
    <rect width="392" height="36" rx="8" fill="#F8FAFC"/>
    <text x="196" y="22" text-anchor="middle" font-size="11" fill="#6B7280">⭐️ Rating: 4.8/5 · 41K reviews · Compatible with iOS 15+</text>
  </g>
  
  <g transform="translate(24, 280)">
    <rect width="392" height="40" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
    <text x="196" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Close</text>
  </g>
  
</svg>