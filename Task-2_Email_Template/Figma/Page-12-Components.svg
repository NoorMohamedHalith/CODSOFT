<?xml version="1.0" encoding="UTF-8"?>
<svg width="1440" height="1080" viewBox="0 0 1440 1080" fill="none"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Page 12 — Component Library</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
    </style>
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(99,102,241,0.08)"/>
    </filter>
    <filter id="shadow-modal">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>

  <rect width="1440" height="1080" fill="#FFFFFF"/>
  
  <!-- Page Header -->
  <rect width="1440" height="80" fill="#FFFFFF"/>
  <line x1="0" y1="79.5" x2="1440" y2="79.5" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Logo -->
  <rect x="40" y="24" width="32" height="32" rx="8" fill="url(#grad-brand)"/>
  <path d="M56 30l-4 2v4a4 4 0 008 0v-4l-4-2z" fill="white"/>
  <text x="82" y="46" font-size="16" font-weight="800" fill="url(#grad-brand)">FlowSphere</text>
  <text x="180" y="45" font-size="14" font-weight="400" fill="#6B7280" opacity="0.5">|</text>
  <text x="196" y="46" font-size="15" font-weight="700" fill="#111827">Component Library & Interface Specs</text>
  <!-- Page number -->
  <rect x="1340" y="24" width="60" height="32" rx="16" fill="#EEF2FF"/>
  <text x="1370" y="45" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">PAGE 12</text>
  

  <!-- Section Title -->
  <text x="80" y="130" font-size="18" font-weight="800" fill="#111827">Interface Components</text>

  <!-- Component Card 1: Buttons -->
  <g transform="translate(80, 160)" filter="url(#shadow)">
    <rect width="600" height="380" rx="16" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    <text x="30" y="36" font-size="13" font-weight="700" fill="#6366F1" letter-spacing="1">BUTTON COMPONENTS</text>
    
    <!-- Primary CTA component -->
    <g transform="translate(30, 60)">
      <rect width="180" height="46" rx="8" fill="url(#grad-brand)"/>
      <text x="90" y="27" font-size="13" font-weight="700" fill="white" text-anchor="middle">→  Get Started</text>
      <text x="200" y="26" font-size="12" font-weight="600" fill="#111827">Primary Button</text>
      <text x="200" y="44" font-size="10.5" fill="#6B7280">Height: 46px · Gradient: #6366F1→#8B5CF6 · Radius: 8px</text>
    </g>

    <!-- Secondary button component -->
    <g transform="translate(30, 130)">
      <rect width="180" height="46" rx="8" fill="white" stroke="#6366F1" stroke-width="1.5"/>
      <text x="90" y="27" font-size="13" font-weight="700" fill="#6366F1" text-anchor="middle">Learn More</text>
      <text x="200" y="26" font-size="12" font-weight="600" fill="#111827">Secondary Button</text>
      <text x="200" y="44" font-size="10.5" fill="#6B7280">Height: 46px · Border: #6366F1 · Fill: White</text>
    </g>

    <!-- White button component -->
    <g transform="translate(30, 200)">
      <rect width="180" height="46" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <text x="90" y="27" font-size="13" font-weight="700" fill="#6366F1" text-anchor="middle">Claim Now</text>
      <text x="200" y="26" font-size="12" font-weight="600" fill="#111827">White Card Button</text>
      <text x="200" y="44" font-size="10.5" fill="#6B7280">Height: 46px · Shadow: soft-elevation · Fill: White</text>
    </g>
  </g>

  <!-- Component Card 2: Feature Cards -->
  <g transform="translate(760, 160)" filter="url(#shadow)">
    <rect width="600" height="380" rx="16" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
    <text x="30" y="36" font-size="13" font-weight="700" fill="#6366F1" letter-spacing="1">CARD COMPONENTS</text>
    
    <!-- Feature card preview -->
    <g transform="translate(30, 60)">
      <rect width="180" height="150" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <rect x="66" y="20" width="48" height="48" rx="8" fill="#EEF2FF"/>
      <text x="90" y="96" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Feature Title</text>
      <text x="90" y="116" font-size="10" fill="#6B7280" text-anchor="middle">Detailed description text</text>
      
      <text x="200" y="56" font-size="13" font-weight="700" fill="#111827">Feature Card System</text>
      <text x="200" y="78" font-size="11" fill="#6B7280">Size: 180×150px · Background: White · Border: #E5E7EB</text>
      <text x="200" y="96" font-size="11" fill="#6B7280">Features icon: nested SVG centering dynamic color states.</text>
    </g>

    <!-- Testimonial card preview -->
    <g transform="translate(30, 230)">
      <rect width="240" height="110" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <text x="16" y="30" font-size="10.5" fill="#111827" font-style="italic">"We love FlowSphere. Awesome team sync!"</text>
      <circle cx="28" cy="80" r="14" fill="#EEF2FF"/>
      <text x="50" y="78" font-size="11" font-weight="600" fill="#111827">Sarah Chen</text>
      <text x="50" y="92" font-size="9" fill="#6B7280">Lead Dev @ Nexus</text>
      
      <text x="290" y="46" font-size="13" font-weight="700" fill="#111827">Testimonial Card</text>
      <text x="290" y="68" font-size="11" fill="#6B7280">Size: 240×110px · Rating: ★★★★★</text>
    </g>
  </g>
  
</svg>