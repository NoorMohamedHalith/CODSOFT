<?xml version="1.0" encoding="UTF-8"?>
<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Page 15 — Prototype Spec</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
    </style>
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(99,102,241,0.08)"/>
    </filter>
    <filter id="shadow-modal">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="#FFFFFF"/>
  
  <!-- Page Header -->
  <rect width="1440" height="80" fill="#FFFFFF"/>
  <line x1="0" y1="79.5" x2="1440" y2="79.5" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Logo -->
  <rect x="40" y="24" width="32" height="32" rx="8" fill="url(#grad-brand)"/>
  <path d="M56 30l-4 2v4a4 4 0 008 0v-4l-4-2z" fill="white"/>
  <text x="82" y="46" font-size="16" font-weight="800" fill="url(#grad-brand)">FlowSphere</text>
  <text x="180" y="45" font-size="14" font-weight="400" fill="#6B7280" opacity="0.5">|</text>
  <text x="196" y="46" font-size="15" font-weight="700" fill="#111827">Figma Interactive Prototype Flow</text>
  <!-- Page number -->
  <rect x="1340" y="24" width="60" height="32" rx="16" fill="#EEF2FF"/>
  <text x="1370" y="45" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">PAGE 15</text>
  

  <!-- Flow diagram mapping hotspots to modals -->
  <g transform="translate(80, 140)">
    <text x="0" y="24" font-size="16" font-weight="800" fill="#111827">Interaction &amp; Connection Map</text>

    <!-- Source frame (welcome email diagram) -->
    <g transform="translate(0, 60)">
      <rect width="380" height="600" rx="16" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1.5"/>
      <rect width="380" height="50" rx="16 16 0 0" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
      <text x="190" y="32" font-size="13" font-weight="800" fill="#111827" text-anchor="middle">FlowSphere Email template</text>
      
      <!-- Hotspots list in the mockup -->
      <!-- Contact header nav -->
      <g transform="translate(20, 12)">
        <rect width="340" height="26" rx="4" fill="rgba(99,102,241,0.06)" stroke="#6366F1" stroke-width="1" stroke-dasharray="2 2"/>
        <text x="320" y="18" font-size="9" font-weight="700" fill="#6366F1" text-anchor="end">Hotspot E (Contact)</text>
      </g>

      <!-- Get Started -->
      <g transform="translate(40, 120)">
        <rect width="300" height="40" rx="8" fill="rgba(99,102,241,0.12)" stroke="#6366F1" stroke-width="1.5"/>
        <text x="150" y="24" font-size="11" font-weight="800" fill="#6366F1" text-anchor="middle">Hotspot A: "Get Started Free"</text>
      </g>

      <!-- Features (just static illustration) -->
      <rect x="40" y="180" width="300" height="120" rx="8" fill="white" stroke="#E5E7EB"/>
      <text x="190" y="240" font-size="12" fill="#6B7280" text-anchor="middle">Features Grid</text>

      <!-- Claim Now -->
      <g transform="translate(40, 320)">
        <rect width="300" height="40" rx="8" fill="rgba(99,102,241,0.12)" stroke="#6366F1" stroke-width="1.5"/>
        <text x="150" y="24" font-size="11" font-weight="800" fill="#6366F1" text-anchor="middle">Hotspot B: "Claim Now"</text>
      </g>

      <!-- Download badges (App Store / Google Play) -->
      <g transform="translate(40, 390)">
        <rect width="140" height="40" rx="8" fill="rgba(99,102,241,0.12)" stroke="#6366F1" stroke-width="1.5"/>
        <text x="70" y="24" font-size="9.5" font-weight="700" fill="#6366F1" text-anchor="middle">Hotspot F (Play Store)</text>
      </g>
      <g transform="translate(200, 390)">
        <rect width="140" height="40" rx="8" fill="rgba(99,102,241,0.12)" stroke="#6366F1" stroke-width="1.5"/>
        <text x="70" y="24" font-size="9.5" font-weight="700" fill="#6366F1" text-anchor="middle">Hotspot G (App Store)</text>
      </g>

      <!-- Footer Policy & Terms -->
      <g transform="translate(40, 520)">
        <rect width="90" height="30" rx="6" fill="rgba(99,102,241,0.12)" stroke="#6366F1" stroke-width="1.5"/>
        <text x="45" y="18" font-size="9" font-weight="700" fill="#6366F1" text-anchor="middle">Hotspot C (Privacy)</text>
      </g>
      <g transform="translate(145, 520)">
        <rect width="90" height="30" rx="6" fill="rgba(99,102,241,0.12)" stroke="#6366F1" stroke-width="1.5"/>
        <text x="45" y="18" font-size="9" font-weight="700" fill="#6366F1" text-anchor="middle">Hotspot D (Terms)</text>
      </g>
    </g>

    <!-- Target frames (modal overlays diagram in columns) -->
    <!-- Column 1 (X: 700) -->
    <g transform="translate(700, 60)">
      <!-- 1. Success Popup -->
      <g id="tgt-success" transform="translate(0, 0)" filter="url(#shadow-modal)">
        <rect width="240" height="110" rx="10" fill="white" stroke="#22C55E" stroke-width="1.5"/>
        <text x="20" y="32" font-size="12" font-weight="800" fill="#111827">1. Success Popup</text>
        <text x="20" y="56" font-size="10.5" fill="#6B7280">- Thank You Message</text>
        <text x="20" y="74" font-size="10.5" fill="#6B7280">- Continue &amp; Close buttons</text>
      </g>

      <!-- 2. Limited Offer Popup -->
      <g id="tgt-offer" transform="translate(0, 160)" filter="url(#shadow-modal)">
        <rect width="240" height="110" rx="10" fill="white" stroke="#6366F1" stroke-width="1.5"/>
        <text x="20" y="32" font-size="12" font-weight="800" fill="#111827">2. Limited Offer Popup</text>
        <text x="20" y="56" font-size="10.5" fill="#6B7280">- 30 Days Free Benefits</text>
        <text x="20" y="74" font-size="10.5" fill="#6B7280">- Claim &amp; Close buttons</text>
      </g>

      <!-- 3. Contact Information Popup -->
      <g id="tgt-contact" transform="translate(0, 320)" filter="url(#shadow-modal)">
        <rect width="240" height="110" rx="10" fill="white" stroke="#6366F1" stroke-width="1.5"/>
        <text x="20" y="32" font-size="12" font-weight="800" fill="#111827">3. Contact Popup</text>
        <text x="20" y="56" font-size="10.5" fill="#6B7280">- Email, Phone, Website</text>
        <text x="20" y="74" font-size="10.5" fill="#6B7280">- Social links &amp; Close</text>
      </g>
    </g>

    <!-- Column 2 (X: 980) -->
    <g transform="translate(980, 60)">
      <!-- 4. Privacy Policy Page -->
      <g id="tgt-privacy" transform="translate(0, 0)" filter="url(#shadow-modal)">
        <rect width="240" height="110" rx="10" fill="white" stroke="#6366F1" stroke-width="1.5"/>
        <text x="20" y="32" font-size="12" font-weight="800" fill="#111827">4. Privacy Policy Page</text>
        <text x="20" y="56" font-size="10.5" fill="#6B7280">- Full-page policy layout</text>
        <text x="20" y="74" font-size="10.5" fill="#6B7280">- Interactive Back button</text>
      </g>

      <!-- 5. Terms & Conditions Page -->
      <g id="tgt-terms" transform="translate(0, 160)" filter="url(#shadow-modal)">
        <rect width="240" height="110" rx="10" fill="white" stroke="#6366F1" stroke-width="1.5"/>
        <text x="20" y="32" font-size="12" font-weight="800" fill="#111827">5. Terms &amp; Conditions Page</text>
        <text x="20" y="56" font-size="10.5" fill="#6B7280">- Full-page terms layout</text>
        <text x="20" y="74" font-size="10.5" fill="#6B7280">- Interactive Back button</text>
      </g>

      <!-- 6. Download Confirmations -->
      <g id="tgt-download" transform="translate(0, 320)" filter="url(#shadow-modal)">
        <rect width="240" height="110" rx="10" fill="white" stroke="#6366F1" stroke-width="1.5"/>
        <text x="20" y="32" font-size="12" font-weight="800" fill="#111827">6. Download Confirmation</text>
        <text x="20" y="56" font-size="10.5" fill="#6B7280">- App Store / Google Play</text>
        <text x="20" y="74" font-size="10.5" fill="#6B7280">- QR Code scan &amp; Close</text>
      </g>
    </g>

    <!-- Connection Paths -->
    <!-- Hotspot A -> Success -->
    <path d="M340 200 L 520 200 L 520 115 L 700 115" stroke="#6366F1" stroke-width="1.5" fill="none" stroke-dasharray="3 3"/>
    <!-- Hotspot B -> Offer -->
    <path d="M340 400 L 540 400 L 540 275 L 700 275" stroke="#6366F1" stroke-width="1.5" fill="none" stroke-dasharray="3 3"/>
    <!-- Hotspot E -> Contact -->
    <path d="M360 85 L 560 85 L 560 435 L 700 435" stroke="#6366F1" stroke-width="1.5" fill="none" stroke-dasharray="3 3"/>
    <!-- Hotspot C -> Privacy -->
    <path d="M130 680 L 130 710 L 940 710 L 940 115 L 980 115" stroke="#6366F1" stroke-width="1.5" fill="none" stroke-dasharray="3 3"/>
    <!-- Hotspot D -> Terms -->
    <path d="M235 680 L 235 730 L 960 730 L 960 275 L 980 275" stroke="#6366F1" stroke-width="1.5" fill="none" stroke-dasharray="3 3"/>
    <!-- Hotspots F/G -> Download -->
    <path d="M180 470 L 180 490 L 920 490 L 920 435 L 980 435" stroke="#6366F1" stroke-width="1.5" fill="none" stroke-dasharray="3 3"/>

    <!-- Arrow head caps -->
    <polygon points="700,115 692,111 692,119" fill="#6366F1"/>
    <polygon points="700,275 692,271 692,279" fill="#6366F1"/>
    <polygon points="700,435 692,431 692,439" fill="#6366F1"/>
    <polygon points="980,115 972,111 972,119" fill="#6366F1"/>
    <polygon points="980,275 972,271 972,279" fill="#6366F1"/>
    <polygon points="980,435 972,431 972,439" fill="#6366F1"/>
  </g>
  
</svg>