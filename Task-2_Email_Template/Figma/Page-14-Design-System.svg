<?xml version="1.0" encoding="UTF-8"?>
<svg width="1440" height="1080" viewBox="0 0 1440 1080" fill="none"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Page 14 — Design System</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
    </style>
    <linearGradient id="grad-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(99,102,241,0.08)"/>
    </filter>
    <filter id="shadow-modal">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>

  <rect width="1440" height="1080" fill="#FFFFFF"/>
  
  <!-- Page Header -->
  <rect width="1440" height="80" fill="#FFFFFF"/>
  <line x1="0" y1="79.5" x2="1440" y2="79.5" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Logo -->
  <rect x="40" y="24" width="32" height="32" rx="8" fill="url(#grad-brand)"/>
  <path d="M56 30l-4 2v4a4 4 0 008 0v-4l-4-2z" fill="white"/>
  <text x="82" y="46" font-size="16" font-weight="800" fill="url(#grad-brand)">FlowSphere</text>
  <text x="180" y="45" font-size="14" font-weight="400" fill="#6B7280" opacity="0.5">|</text>
  <text x="196" y="46" font-size="15" font-weight="700" fill="#111827">FlowSphere System Tokens</text>
  <!-- Page number -->
  <rect x="1340" y="24" width="60" height="32" rx="16" fill="#EEF2FF"/>
  <text x="1370" y="45" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">PAGE 14</text>
  

  <!-- Left: Color Palette Swatches -->
  <g transform="translate(80, 140)">
    <text x="0" y="24" font-size="16" font-weight="800" fill="#111827">Color Palette</text>
    
    
      <g transform="translate(0, 50)">
        <rect width="50" height="50" rx="8" fill="#6366F1" stroke="#E5E7EB" stroke-width="1"/>
        <text x="70" y="20" font-size="13" font-weight="700" fill="#111827">Primary/Default</text>
        <text x="70" y="38" font-size="12" fill="#6B7280">#6366F1 · SaaS soft indigo accent</text>
      </g>
    
      <g transform="translate(0, 140)">
        <rect width="50" height="50" rx="8" fill="#8B5CF6" stroke="#E5E7EB" stroke-width="1"/>
        <text x="70" y="20" font-size="13" font-weight="700" fill="#111827">Secondary/Default</text>
        <text x="70" y="38" font-size="12" fill="#6B7280">#8B5CF6 · Accent secondary gradient</text>
      </g>
    
      <g transform="translate(0, 230)">
        <rect width="50" height="50" rx="8" fill="#22C55E" stroke="#E5E7EB" stroke-width="1"/>
        <text x="70" y="20" font-size="13" font-weight="700" fill="#111827">Success/Default</text>
        <text x="70" y="38" font-size="12" fill="#6B7280">#22C55E · Positive verification indicators</text>
      </g>
    
      <g transform="translate(0, 320)">
        <rect width="50" height="50" rx="8" fill="#111827" stroke="#E5E7EB" stroke-width="1"/>
        <text x="70" y="20" font-size="13" font-weight="700" fill="#111827">Neutral/Text</text>
        <text x="70" y="38" font-size="12" fill="#6B7280">#111827 · High-contrast text</text>
      </g>
    
      <g transform="translate(0, 410)">
        <rect width="50" height="50" rx="8" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1"/>
        <text x="70" y="20" font-size="13" font-weight="700" fill="#111827">Neutral/Surface</text>
        <text x="70" y="38" font-size="12" fill="#6B7280">#F8FAFC · Subtle gray surface fills</text>
      </g>
    
      <g transform="translate(0, 500)">
        <rect width="50" height="50" rx="8" fill="#E5E7EB" stroke="#E5E7EB" stroke-width="1"/>
        <text x="70" y="20" font-size="13" font-weight="700" fill="#111827">Neutral/Border</text>
        <text x="70" y="38" font-size="12" fill="#6B7280">#E5E7EB · Separators & card borders</text>
      </g>
    
  </g>

  <!-- Right: Typography Scale -->
  <g transform="translate(680, 140)">
    <text x="0" y="24" font-size="16" font-weight="800" fill="#111827">Typography Scale (Ramp)</text>
    
    <g transform="translate(0, 50)">
      
        <g transform="translate(0, 0)">
          <text x="0" y="16" font-size="11" font-weight="700" fill="#6366F1" letter-spacing="0.5">H1 / HERO TITLE</text>
          <text x="0" y="38" font-size="18" font-weight="800" fill="#111827">36px · Inter 800 ExtraBold</text>
          <text x="0" y="56" font-size="12" fill="#6B7280">Main headings</text>
        </g>
      
        <g transform="translate(0, 90)">
          <text x="0" y="16" font-size="11" font-weight="700" fill="#6366F1" letter-spacing="0.5">H2 / SECTION TITLE</text>
          <text x="0" y="38" font-size="18" font-weight="800" fill="#111827">26px · Inter 700 Bold</text>
          <text x="0" y="56" font-size="12" fill="#6B7280">Secondary headings</text>
        </g>
      
        <g transform="translate(0, 180)">
          <text x="0" y="16" font-size="11" font-weight="700" fill="#6366F1" letter-spacing="0.5">H3 / CARD TITLE</text>
          <text x="0" y="38" font-size="18" font-weight="800" fill="#111827">18px · Inter 700 Bold</text>
          <text x="0" y="56" font-size="12" fill="#6B7280">Card titles</text>
        </g>
      
        <g transform="translate(0, 270)">
          <text x="0" y="16" font-size="11" font-weight="700" fill="#6366F1" letter-spacing="0.5">BODY / REGULAR</text>
          <text x="0" y="38" font-size="18" font-weight="800" fill="#111827">16px · Inter 400 Regular</text>
          <text x="0" y="56" font-size="12" fill="#6B7280">Paragraphs, descriptions</text>
        </g>
      
        <g transform="translate(0, 360)">
          <text x="0" y="16" font-size="11" font-weight="700" fill="#6366F1" letter-spacing="0.5">SMALL / MEDIUM</text>
          <text x="0" y="38" font-size="18" font-weight="800" fill="#111827">14px · Inter 500 Medium</text>
          <text x="0" y="56" font-size="12" fill="#6B7280">Secondary labels, buttons</text>
        </g>
      
        <g transform="translate(0, 450)">
          <text x="0" y="16" font-size="11" font-weight="700" fill="#6366F1" letter-spacing="0.5">CAPTION / BOLD</text>
          <text x="0" y="38" font-size="18" font-weight="800" fill="#111827">12px · Inter 700 Bold</text>
          <text x="0" y="56" font-size="12" fill="#6B7280">Eyebrows, tag text</text>
        </g>
      
    </g>
  </g>
  
</svg>